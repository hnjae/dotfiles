---
- name: Configure localhost user environment
  hosts: localhost
  connection: local
  become: false
  roles:
    - gather_facts
    - various
    - role: flatpak
      when: is_flatpak
    - role: default_app
      when: is_flatpak  # is_flatpak 을 desktop 인지 아닌지 판단하는 용도로 사용
    - role: systemd_user_services
      when:
        - ansible_system == "Linux"
        - ansible_service_mgr == "systemd"
