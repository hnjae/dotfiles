<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
	<alias binding="strong">
		<family>Oxygen-Sans</family>
		<prefer>
			<family>Oxygen-Sans</family>
			<family>Noto Sans CJK JP DemiLight</family>
			<family>Noto Sans CJK KR DemiLight</family>
			<family>Noto Sans CJK SC DemiLight</family>
			<family>Noto Sans CJK TC DemiLight</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>Oxygen Mono</family>
		<prefer>
			<family>Oxygen Mono</family>
			<family>Noto Sans Mono CJK JP</family>
			<family>Noto Sans Mono CJK KR</family>
			<family>Noto Sans Mono CJK SC</family>
			<family>Noto Sans Mono CJK TC</family>
		</prefer>
	</alias>
</fontconfig>
