# vim:ft=conf

# NOTE: swayidleмқҳ м„Өм •мқҖ лі„лҸ„ м„Өм • нҢҢмқјлЎң м ҖмһҘ.
exec --no-startup-id swayidle -w
exec --no-startup-id "$HOME/.config/sway/auto-manager/popup-enabler"

# reset gtk-setting
exec_always --no-startup-id gsettings reset org.gnome.desktop.interface scaling-factor
exec_always --no-startup-id gsettings reset org.gnome.desktop.interface cursor-size
