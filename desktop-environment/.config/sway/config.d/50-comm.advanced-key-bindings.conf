# Advanced Key bindings
################################################################################

# Programs


# == App Launcher ==
# Start a terminal
bindsym $mod+Return exec $term
bindsym $mod+n exec $term -e nvim


# Shortcut (Mod4: Super)
set $app_launcher1 Mod4+Mod1
set $app_launcher2 Mod4+Hangul
bindsym $app_launcher1+b exec firefox
bindsym $app_launcher2+b exec firefox
bindsym $app_launcher1+f exec pcmanfm-qt
bindsym $app_launcher2+f exec pcmanfm-qt
bindsym $app_launcher1+l exec $term -e lf
bindsym $app_launcher1+c exec $term -e qalc
# bindsym $app_launcher1+r exec $term -e ranger
# bindsym $app_launcher2+r exec $term -e ranger
# bindsym $app_launcher1+w exec $term -e 'ranger "$HOME/Sync/Library/wiki/"'
# bindsym $app_launcher2+w exec $term -e 'ranger "$HOME/Sync/Library/wiki/"'
# bindsym $app_launcher1+t exec $term -e 'ranger "$HOME/Sync/Library/wiki/todo/"'
# bindsym $app_launcher2+t exec $term -e 'ranger "$HOME/Sync/Library/wiki/todo/"'
bindsym $app_launcher1+h exec $term -e htop
bindsym $app_launcher2+h exec $term -e htop

bindsym Control+F9 exec $launcher


bindsym $app_launcher1+s exec $setting_menu
bindsym $app_launcher2+s exec $setting_menu

# bindsym Control+semicolon exec $clipboard
# bindsym $mod+c exec $clipboard
# bindsym $mod+n exec $emoji
# bindsym $mod+o exec $rofi_pulse sink
bindsym $mod+o exec "$HOME/.local/bin/__wofi-pulse-menu sink"

# == XF86 Keys (/usr/share/X11/xkb/symbols/inet) ==
# === Very Common Media Keys (media_common) === {{{
# bindsym XF86AudioMedia
bindsym XF86AudioPrev exec --no-startup-id playerctl previous
bindsym XF86AudioNext exec --no-startup-id playerctl next
bindsym XF86AudioPlay exec --no-startup-id playerctl play-pause
bindsym XF86AudioPause exec --no-startup-id playerctl play-pause
bindsym XF86AudioForward  exec --no-startup-id playerctl position +6
bindsym XF86AudioRewind   exec --no-startup-id playerctl position -6
# TODO: xt86 rewind back 도 추가하기 <2021-07-19, Hyunjae Kim> #
# XF86AudioPlay 랑 XF86AudioPause 는 같은 keycode 로 매핑되어 있는 경우가 많다.
bindsym XF86AudioStop exec --no-startup-id playerctl stop
# bindsym XF86Eject exec --no-startup-id playerctl stop
# XF86AudioStop 랑 XF86Eject 는 같은 keycode 로 매핑되어 있는 경우가 많다.
bindsym XF86AudioLowerVolume exec --no-startup-id "$HOME/.local/bin/__volume-control down 2"
bindsym XF86AudioRaiseVolume exec --no-startup-id "$HOME/.local/bin/__volume-control up 2"
bindsym XF86AudioMute exec --no-startup-id "$HOME/.local/bin/__volume-control mute"
bindsym XF86AudioMicMute exec --no-startup-id "pactl set-source-mute @DEFAULT_SOURCE@ toggle"

# === Popular web navigation Keys (nav_common) ===
bindsym XF86Calculator exec --no-startup-id $HOME/.local/bin/__xf86-launcher calculator
bindsym XF86Mail       exec --no-startup-id $HOME/.local/bin/__xf86-launcher mail
bindsym XF86Explorer   exec --no-startup-id $HOME/.local/bin/__xf86-launcher explorer
bindsym XF86WWW        exec --no-startup-id $HOME/.local/bin/__xf86-launcher www
bindsym XF86MyComputer exec --no-startup-id $HOME/.local/bin/__xf86-launcher mycomputer
# bindsym XF86Search exec --no-startup-id _xf86-launcher search
# === Evdev Standardized Keycodes (evdev) ===
bindsym XF86TouchpadToggle exec --no-startup-id "$HOME/.local/bin/__touchpad-toggle"
bindsym XF86TouchpadOn     exec --no-startup-id "$HOME/.local/bin/__touchpad-toggle on"
bindsym XF86TouchpadOff    exec --no-startup-id "$HOME/.local/bin/__touchpad-toggle off"
# ==== Rog Key ====
bindsym XF86Launch1 exec --no-startup-id $setting_menu
# FN + F4 (AURA Key)
# bindsym XF86Launch3 exec --no-startup-id "playerctl play-pause"
# FN + F5 (Fan Mark)
bindsym XF86Launch4 exec --no-startup-id "$HOME/.local/bin/__asusctl-profile"
bindsym XF86MonBrightnessDown exec --no-startup-id "$HOME/.local/bin/__brightness-control down 5"
bindsym XF86MonBrightnessUp  exec --no-startup-id "$HOME/.local/bin/__brightness-control up 5"
bindsym Control+7 exec --no-startup-id "$HOME/.local/bin/__brightness-control down 5"
bindsym Control+8 exec --no-startup-id "$HOME/.local/bin/__brightness-control up 5"
bindsym XF86MonBrightnessCycle exec \
    "notify-send i3 'XF86MonBrightnessCycle Not implemented'"

# === PC 105 ===
# bindsym XF86KbdLightOnOff
# FN + F2
bindsym XF86KbdBrightnessDown \
    exec brightnessctl --device=asus::kbd_backlight set 1-, \
    exec "$HOME/.config/i3/scripts/notify_KbdBrightness.sh"
# FN + F3
bindsym XF86KbdBrightnessUp \
    exec brightnessctl --device=asus::kbd_backlight set +1, \
    exec "$HOME/.config/i3/scripts/notify_KbdBrightness.sh"

# == Windows Shortcut ==
# === Screenshot (use flameshot or maim) ===
# -----------------------------------------------------------------------------
# Capture Entire Screen to clipboard
# bindsym Print exec flameshot full --clipboard
bindsym Print exec "$HOME/.local/bin/__screenshot"
bindsym Mod1+Print exec flameshot gui
bindsym Mod4+Print exec flameshot gui
# Window + PrintScreen: Capture Screen and save it to file
# bindsym Mod4+Print exec "$HOME/.config/i3/scripts/scrot_fullscreen_file.sh"

# Alt + PrintScreen: Capture Window to Clipboard
# 2021-05-22 Mod1+Print does not work (키보드 문제인듯)
# bindsym Mod1+Print exec "$HOME/.config/sway/scripts/screenshot.sh window clipboard"
# bindsym Control+Print exec "$HOME/.config/i3/scripts/maim_activewindow_clipboard.sh"
# bindsym Mod1+Mod4+Print exec "$HOME/.config/i3/scripts/maim_activewindow.sh" file
bindsym Control+Print exec "__screenshot window file"

# FN + F6: Super + Shift + s (Mod4: Super)
bindsym Mod4+Shift+s exec flameshot gui --path "$HOME/Pictures"
bindsym Mod1+Shift+s exec flameshot gui --path "$HOME/Pictures"
# FN + F6: Alt + Shift + r (mode
bindsym Mod1+Shift+r exec flameshot gui --path "$HOME/Pictures"
# bindsym Mod4+Shift+r exec flameshot gui --path "$HOME/Pictures"

