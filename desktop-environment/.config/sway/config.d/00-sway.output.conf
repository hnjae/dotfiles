# 10-sway.output.conf

# man 5 sway-output

output * {
	# bg /usr/share/backgrounds/gnome/adwaita-d.webp tile
	bg "#0f0f0f" solid_color
	scale 1
	scale_filter smart
	adaptive_sync off
}

# output "Chimei Innolux Corporation 0x152A 0x00000000" {
output "Chimei Innolux Corporation 0x152A Unknown" {
	# NOTE: 2560x1440, 15.6in, dpi 188.28
	# Target Relative display Size:
	# 	1600x900 - scale 1.60
	#       1568x882 - scale 1.632653061
	# 	1536x864 - scale 1.666666667
	# 	1472x828 - scale 1.739130435
	# 	1312x738 - scale 1.951219512 (96.49 DPI)
	# 	1280x720 - scale 2 (87.89dpi)

	enable
        mode "2560x1440@165.003Hz"
	scale 1.6
	# scale 1.632653061
}

# output "BenQ Corporation BenQ PD2700U ET83K02766SL0" {
output "BNQ BenQ PD2700U ET83K02766SL0" {
# output "DP-3" {
	# NOTE: dpi 163.18, 3840x2160 27in (23.53" × 13.24")
	# Target Relative display size:
	#	1952x1098 - scale 1.967213115
	#  	2048x1152 - scale 1.875 (105dpi)
	# 	2176x1224 - scale 1.764705882
	# 	2560x1440 - scale 1.5
	# 	2304x1296 - scale 1.666666667

	enable
        mode "3840x2160@60.000Hz"

	render_bit_depth 10
	max_render_time 10
	# scale 1.967213115
	# scale 2.162162162
	scale 1.7
	# scale 1
	# scale 3

	# adaptive_sync not working
	adaptive_sync off
}
