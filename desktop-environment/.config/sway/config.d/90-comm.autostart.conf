# dunst 실행안해도 자동으로 불러들이는 듯 (2020-12-06)
# dunst는 i3 restart 해도 살아있어서 다시 시작할 필요 없음 (2021-11-03)
exec_always --no-startup-id $program-relauncher swaync

# exec --no-startup-id clipmenud
# exec_always --no-startup-id clipcatd
# $execi autocutsel -fork
# $execi autocutsel -selection PRIMARY -fork

# exec --no-startup-id gammastep
exec_always --no-startup-id fcitx5 -rd

# Late Start
exec_always --no-startup-id $program-relauncher ulauncher --hide-window
exec_always --no-startup-id $program-relauncher blueman-applet
exec_always --no-startup-id $program-relauncher nm-applet --indicator
