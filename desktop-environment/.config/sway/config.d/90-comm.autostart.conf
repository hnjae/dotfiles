exec_always --no-startup-id $program-relauncher 1password --silent
exec_always --no-startup-id $program-relauncher firewall-applet

exec_always --no-startup-id $program-relauncher copyq

exec_always --no-startup-id $program-relauncher syncthing-gtk --minimized

# exec --no-startup-id spotifyd
# exec systemctl --user start spotifyd

