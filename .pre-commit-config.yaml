# See: https://pre-commit.com/
default_stages: [pre-commit]
exclude: |
  (?x)^(
    .*/lazy-lock\.json|
    .*/zed/.*\.json|
    /profiles/00-default/xdg-data/zimfw/.*|
    /.lib/dotbot/.*
  )$
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key
        fail_fast: true
      - id: check-added-large-files
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: check-xml
  - repo: local
    hooks:
      - id: shellharden
        name: harden shell
        entry: shellharden --replace
        language: system
        files: &shell_files |
          (?x)^(
            .*\.(sh|bash)$|
            \.envrc(\..+)?$|
            \.env(\..+)?$|
            \.profile$
          )
      - id: shellcheck
        name: check shell
        entry: shellcheck
        language: system
        files: *shell_files
      - id: shfmt
        name: format shell
        entry: shfmt --indent 4 --simplify --write
        language: system
        files: *shell_files
  - repo: local
    hooks:
      - id: just-fmt
        name: format just
        entry: bash -c 'just --fmt --unstable --justfile "$1"' --
        language: system
        files: (^|/)(\.)?justfile$
      - id: fish-indent
        name: format fish
        entry: fish_indent --write
        language: system
        types: [fish]
      - id: yamlfmt
        name: format yaml
        entry: yamlfmt
        language: system
        types: [yaml]
      - id: biome
        name: format json(c)
        entry: biome format --write
        language: system
        files: \.(json|jsonc)$
      - id: rumdl-fmt
        name: format markdown
        entry: rumdl fmt
        language: system
        types: [markdown]
      - id: rumdl-check
        name: check markdown
        entry: rumdl check --check
        language: system
        types: [markdown]
        stages: [pre-merge-commit]
