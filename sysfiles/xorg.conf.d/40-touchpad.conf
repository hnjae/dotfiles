# MatchDevicePath "/dev/input/event*"
# Driver "libinput"

Section "InputClass"
        Identifier "custom-system-touchpad-catchall"
        MatchIsTouchpad "on"
	Option "NaturalScrolling" "true"
	Option "DisableWhileTyping" "true"
	Option "Tapping" "true"
	Option "TappingDrag" "true"
	# Option "AccelProfile" "adaptive"
EndSection
