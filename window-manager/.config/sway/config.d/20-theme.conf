# = Theme =
# font pango:FontAwesome, monospace 10
font pango:Pretendard 11

# gaps inner 3
# smart_borders on : deprecated?? 2021-11-04 Not Listed in docs
hide_edge_borders --i3 none

# gruvbox theme (by me)
client.focused           #458588 #458588 #FFFFFF
client.focused_inactive  #424242 #424242 #eeeeec
client.unfocused         #424242 #424242 #eeeeec
client.urgent            #cc241d #cc241d #d3869b

# theme (Adwaita-dark from https://gist.github.com/voodoojello/9138ed6f43d1a022a7e41033eca69427)
#                        border     bg         fg         indicator  child_border
# client.focused           #15539e    #15539e    #e0e0e0    #00ff00    #202332
# client.focused_inactive  #383c4a    #383c4a    #e0e0e0    #00ff00    #202332
# client.unfocused         #383c4a    #383c4a    #808080    #00ff00    #202332
# client.urgent            #383c4a    #900000    #ffffff    #00ff00    #202332
# client.placeholder       #383c4a    #0c0c0c    #ffffff    #00ff00    #202332
client.background        #282828

# border & floating
# default_border pixel 5
set $border_px 3
# default_border normal|none|pixel <px>
# default_border pixel $border_px
default_border pixel $border_px
