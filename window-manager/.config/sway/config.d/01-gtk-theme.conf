# gtk-theme.conf
################################################################################

# vim:ft=conf
set $gnome-schema org.gnome.desktop.interface
# exec_always {
#     gsettings set $gnome-schema gtk-theme 'Adwaita-dark'
#     gsettings set $gnome-schema icon-theme 'Newaita-dark'
#     gsettings set $gnome-schema cursor-theme 'Fluent-dark-cursors'
#     gsettings set $gnome-schema color-scheme 'prefer-dark'
#     gsettings set $gnome-schema document-font-name 'Sans Serif 11'
#     gsettings set $gnome-schema font-name 'Sans Serif 10'
#     gsettings set $gnome-schema monospace-font-name 'Monospace 10'
#     gsettings set org.gnome.desktop.wm.preferences button-layout 'appmenu'
# }
exec_always gsettings set $gnome-schema gtk-theme 'Adwaita-dark'
exec_always gsettings set $gnome-schema icon-theme 'Newaita-dark'
exec_always gsettings set $gnome-schema cursor-theme 'Fluent-dark-cursors'
exec_always gsettings set $gnome-schema color-scheme 'prefer-dark'
exec_always gsettings set $gnome-schema document-font-name 'Sans Serif 11'
exec_always gsettings set $gnome-schema font-name 'Sans Serif 10'
exec_always gsettings set $gnome-schema monospace-font-name 'Monospace 10'
exec_always gsettings set org.gnome.desktop.wm.preferences button-layout 'appmenu'
