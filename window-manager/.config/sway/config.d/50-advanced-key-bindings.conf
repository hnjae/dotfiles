# = Advanced Key bindings =
# == App Launcher ==
# Start a terminal
bindsym $mod+Return exec $term
bindsym $mod+n exec termite -e nvim

# Shortcut (Mod4: Super)
set $app_launcher1 Mod4+Mod1
set $app_launcher2 Hangul+Mod1
bindsym $app_launcher1+b exec firefox
bindsym $app_launcher2+b exec firefox
bindsym $app_launcher1+f exec pcmanfm-qt
bindsym $app_launcher2+f exec pcmanfm-qt
bindsym $app_launcher1+r exec $term -e ranger
bindsym $app_launcher2+r exec $term -e ranger
bindsym $app_launcher1+w exec $term -e 'ranger "/home/hyunjae/Sync/Library/wiki/"'
bindsym $app_launcher2+w exec $term -e 'ranger "/home/hyunjae/Sync/Library/wiki/"'
bindsym $app_launcher1+t exec $term -e 'ranger "/home/hyunjae/Sync/Library/wiki/todo/"'
bindsym $app_launcher2+t exec $term -e 'ranger "/home/hyunjae/Sync/Library/wiki/todo/"'
bindsym $app_launcher1+h exec $term -e htop
bindsym $app_launcher2+h exec $term -e htop

bindsym Control+F9 exec $launcher

bindsym Control+F10 exec $powermenu
bindsym Mod1+Mod4+p exec $powermenu
bindsym Mod1+Hangul+p exec $powermenu

bindsym Mod1+Mod4+s exec $setting_menu
bindsym Mod1+Hangul+s exec $setting_menu

# bindsym Control+semicolon exec $clipboard
# bindsym $mod+c exec $clipboard
# bindsym $mod+n exec $emoji
# bindsym $mod+o exec $rofi_pulse sink
set $rofi_pulse_sink "__rofi-pulse.sh sink"
bindsym $mod+o exec $rofi_pulse_sink

# == XF86 Keys (/usr/share/X11/xkb/symbols/inet) ==
# === Very Common Media Keys (media_common) === {{{
# bindsym XF86AudioMedia
bindsym XF86AudioPrev $execi playerctl previous
bindsym XF86AudioNext $execi playerctl next
bindsym XF86AudioPlay $execi playerctl play-pause
bindsym XF86AudioPause $execi playerctl play-pause
bindsym XF86AudioForward  $execi playerctl position +6
bindsym XF86AudioRewind   $execi playerctl position -6
# TODO: xt86 rewind back 도 추가하기 <2021-07-19, Hyunjae Kim> #
# XF86AudioPlay 랑 XF86AudioPause 는 같은 keycode 로 매핑되어 있는 경우가 많다.
bindsym XF86AudioStop $execi playerctl stop
# bindsym XF86Eject $execi playerctl stop
# XF86AudioStop 랑 XF86Eject 는 같은 keycode 로 매핑되어 있는 경우가 많다.
bindsym XF86AudioLowerVolume \
    $execi $volume_control down 2
bindsym XF86AudioRaiseVolume \
    $execi $volume_control up 2
bindsym XF86AudioLowerVolume+Mod1 \
     $execi $volume_control down 8
bindsym XF86AudioRaiseVolume+Mod1 \
    $execi $volume_control up 8
bindsym XF86AudioMute \
    $execi $volume_control mute
bindsym XF86AudioMicMute $execi pactl set-source-mute @DEFAULT_SOURCE@ toggle
# === }}}
