#
# == Windows Shortcut ==
# === Screenshot (use flameshot or maim) ===
# -----------------------------------------------------------------------------
# Capture Entire Screen to clipboard
# bindsym Print exec flameshot full --clipboard
bindsym Print exec "__screenshot"
bindsym Mod1+Print exec flameshot gui
bindsym Mod4+Print exec flameshot gui
# Window + PrintScreen: Capture Screen and save it to file
# bindsym Mod4+Print exec "$HOME/.config/i3/scripts/scrot_fullscreen_file.sh"

# Alt + PrintScreen: Capture Window to Clipboard
# 2021-05-22 Mod1+Print does not work (키보드 문제인듯)
# bindsym Mod1+Print exec "$HOME/.config/sway/scripts/screenshot.sh window clipboard"
# bindsym Control+Print exec "$HOME/.config/i3/scripts/maim_activewindow_clipboard.sh"
# bindsym Mod1+Mod4+Print exec "$HOME/.config/i3/scripts/maim_activewindow.sh" file
bindsym Control+Print exec "__screenshot window file"

# FN + F6: Super + Shift + s (Mod4: Super)
bindsym Mod4+Shift+s exec flameshot gui --path "$HOME/Pictures"
bindsym Mod1+Shift+s exec flameshot gui --path "$HOME/Pictures"
# FN + F6: Alt + Shift + r (mode
bindsym Mod1+Shift+r exec flameshot gui --path "$HOME/Pictures"
# bindsym Mod4+Shift+r exec flameshot gui --path "$HOME/Pictures"

