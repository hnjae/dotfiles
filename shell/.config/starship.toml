# Get editor completions based on the config schema
# "$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

# Inserts a blank line between shell prompts
add_newline = true

[directory]
read_only = " ´á¢"
style = "blue"
format = "[$path]($style)[$read_only]($read_only_style)"

[character]
success_symbol = "[ÔØ»](purple)"
error_symbol = "[ÔØ»](red)"
vicmd_symbol = "[ÔØ«](green)"

[cmd_duration]
min_time = 500
format = " [$duration]($style)"
style = "yellow"

# Disable the package module, hiding it from the prompt completely
# [package]
# disabled = true

[aws]
symbol = "¯î¢  "

[buf]
symbol = "´ÆØ "

[c]
symbol = "¯ÿ× "

[conda]
symbol = "´äî "

[dart]
symbol = "¯×ÿ "

[docker_context]
symbol = "´îê "

[elixir]
symbol = "¯ëÁ "

[elm]
symbol = "¯ÿ¼ "

[git_branch]
symbol = "´Éÿ"
format = " [$symbol $branch]($style)"
style = "bright-black"

[git_commit]
disabled=false

[git_metrics]
# The git_metrics module will show the number of added and deleted lines in the current git repository.
disabled=true

[git_status]
disabled=false
# format='[${ahead_behind}]($style) ([${all_status}]($style))'
style="cyan"
format = " [[($conflicted$untracked$modified$staged$renamed$deleted)](red) ($ahead_behind$stashed)]($style)"
conflicted = "=${count}"
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
up_to_date = "[Ô£ô](bold green)"
untracked = "?${count}"
stashed = "${count}"
modified = "!${count}"
staged = '[+${count}](bold green)'
renamed = "┬╗${count}"
deleted = "Ô£ÿ${count}"


