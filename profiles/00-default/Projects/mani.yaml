  my-python-utils:
    url: git@github.com:hnjae/my-python-utils.git
  nix-config:
    url: git@github.com:hnjae/nix-config.git
  notes:
    url: git@github.com:hnjae/notes.git
  obsidian-archived:
    url: git@github.com:hnjae/obsidian-archived.git
  os-images:
    url: git@github.com:hnjae/os-images.git
  published-articles:
    url: git@github.com:hnjae/published-articles.git
  py-utils:
    url: git@github.com:hnjae/py-utils.git
  restic-scrub:
    url: hnjae@eris:/srv/git/restic-scrub
specs:
  default:
    output: markdown
    parallel: true
    forks: 4
targets:
  home:
    projects: [archive, dotfiles, obsidian, nix-config]
  all:
    all: true
tasks:
  fetch-home:
    target: home
    cmd: git fetch --all
  status:
    target: all
    cmd: git status --short --branch --untracked-files=all
    # branch=$(git rev-parse --abbrev-ref HEAD)
    # ahead_behind=$(git rev-list --count --left-right origin/$branch..$branch) >/dev/null
