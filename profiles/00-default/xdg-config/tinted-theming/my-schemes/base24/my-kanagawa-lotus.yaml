# NOTE:
#   - following version 0.1.3 of base24 <2026-03-09>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#   - `**` 붙은 건 color palette 에서 임의 선정한 값
#
# NOTE:
# Colors:
#   - lotusWhite3 #f2ecbc OKHSL(102, 67, 93) **FG
#   - lotusGray   #dcd7ba OKHSL( 99, 33, 86)
#   - fujiWhite   #DCD7BA OKHSL( 99, 33, 86)
#   - lotusWhite4 #e7dba0 OKHSL( 99, 59, 87)
#   - lotusWhite5 #e4d794 OKHSL( 99, 61, 85)
#   - lotusWhite1 #d5cea3 OKHSL(100, 41, 82)
#   - lotusGray2  #716e61 OKHSL( 96, 12, 46)
#   - lotusGray3  #8A8980 OKHSL(102,  7, 57)
system: base24
name: my-kanagawa-lotus
author: Original by rebelot (https://github.com/rebelot/kanagawa.nvim), Ported by hnjae (https://github.com/hnjae)
variant: light
palette:
  # 무채색
  base00: '#F2ECBC' # ANSI  0 / black (background) / lotusWhite3
  base01: '#E7DBA0' # ** / ANSI 18 / darkest-gray / lotusWhite4
  base02: '#e4d794' # ** / ANSI 19 / dark-gray (selection-bg) / lotusWhite5
  base03: '#8A8980' # ** / ANSI  8 / bright-black (comments) / lotusGray3
  base04: '#727169' # ** / ANSI 20 / dark-foreground / fujiGray
  base05: '#545464' # ANSI  7 / foreground / lotusInk1 (OKHSL (285, 15, 37))
  base06: '#43436C' # ** / ANSI 21 / lighter-white / lotusInk2 (OKHSL (283, 39, 31))
  base07: '#363646' # ** / ANSI 15 / white / sumiInk5 (OKHSL (285, 20, 24))
  # NOTE:
  #   - from v0.1.3 spec: dark-to-light lighter than base00
  #   - lotusWhite3: OKHSL(102, 67, 93)
  base10: '#f6f3d2' # ** / (darker-black) / OKHSL(102, 67, 95)
  base11: '#faf8e4' # ** / (darkest-black) / OKHSL(102, 67, 97)
  # ansi
  base08: '#C84053' # ANSI  1 / red / lotusRed
  base0B: '#6F894E' # ANSI  2 / green / lotusGreen
  base0A: '#77713F' # ANSI  3 / yellow
  base0D: '#4D699B' # ANSI  4 / blue
  base0E: '#B35B79' # ANSI  5 / purple
  base0C: '#597B75' # ANSI  6 / cyan
  # ansi bright
  base12: '#D7474B' # ANSI  9 / bright red / lotusRed2
  base14: '#6E915F' # ANSI 10 / bright green
  base13: '#836F4A' # ANSI 11 / bright yellow / lotusYellow2
  base16: '#6693BF' # ANSI 12 / bright blue
  base17: '#624C83' # ANSI 13 / bright purple
  base15: '#5E857A' # ANSI 14 / bright cyan
  # ansi-extended
  base09: '#E98A00' # ANSI 16 / lotusOrange2
  base0F: '#e82424' # ANSI 17 / lotusRed3
