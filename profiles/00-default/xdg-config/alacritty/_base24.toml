# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 My Gruvbox Light - alacritty color config
# Scheme by Tinted Theming (https://github.com/tinted-theming), morhetz (https://github.com/morhetz/gruvbox)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0xfbf1c7'
foreground = '0x3c3836'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0xfbf1c7'
cursor = '0x3c3836'

[colors.normal]
black = '0xfbf1c7'
red = '0x9d0006'
green = '0x79740e'
yellow = '0xb57614'
blue = '0x076678'
magenta = '0x8f3f71'
cyan = '0x427b58'
white = '0x3c3836'

# Bright colors
[colors.bright]
black = '0xa89984'
red = '0x99000f'
green = '0x686400'
yellow = '0x8f5400'
blue = '0x005b6c'
magenta = '0x8f2a69'
cyan = '0x256946'
white = '0x1d2021'

[[colors.indexed_colors]]
index = 16
color = "0xaf3a03"

[[colors.indexed_colors]]
index = 17
color = "0x9d0006"

[[colors.indexed_colors]]
index = 18
color = "0xebdbb2"

[[colors.indexed_colors]]
index = 19
color = "0xd5c4a1"

[[colors.indexed_colors]]
index = 20
color = "0x7c6f64"

[[colors.indexed_colors]]
index = 21
color = "0x282828"

