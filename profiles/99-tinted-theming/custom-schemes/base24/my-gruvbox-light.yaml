---
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
# NOTE: gruvbox 에서는 #928374 OKHSL (67, 16, 56)를 comment 색상으로 사용함. (light)
# 변경점
# - base10 을 gruvbox 의 색상으로 변경
# - base11 를 base10 에서 saturate 이랑, luminance 를 올림으로서, 임의로 결정
# - base03 을 #BDAE093 (L: 72) 보다 더 어두운 색 #A89984 (L: 64) 채택
# - base08-base0e 가 neutral 색상을 택하는데, 읽기 힘들어 더 진한색으로 변경 - grubox-material 의 색조합 사용
system: "base24"
name: "My Gruvbox Light"
author: "Tinted Theming (https://github.com/tinted-theming), morhetz (https://github.com/morhetz/gruvbox)"
variant: "light"
palette:
  base00: "#fbf1c7"
  base01: "#ebdbb2"
  base02: "#d5c4a1" # OKHSL (85, 35, 80)
  base03: "#a89984" # OKHSL (76, 20, 64) // default: #bdae093 (82, 25, 72)
  base04: "#7c6f64" # OKHSL (63, 13, 48)
  base05: "#3c3836"
  base06: "#282828"
  base07: "#1d2021"
  base08: "#C14A4A"
  base09: "#C35E0A"
  base0A: "#B47109"
  base0B: "#6C782E"
  base0C: "#4C7A5D"
  base0D: "#45707A"
  base0E: "#945E80"
  base0F: "#9d0006"
  base10: "#f9f5d7" # OKHSL (101,  72, 96)
  base11: "#fffbdc" # OKHSL (101, 100, 99)
  base12: "#9d0006" # OKHSL ( 28, 100, 35)
  base13: "#b57614"
  base14: "#79740e"
  base15: "#427b58"
  base16: "#076678"
  base17: "#8f3f71"
