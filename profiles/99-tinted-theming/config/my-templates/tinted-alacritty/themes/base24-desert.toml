# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Desert - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x333333'
foreground = '0xcdbb9b'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x333333'
cursor = '0xcdbb9b'

[colors.normal]
black = '0x333333'
red = '0xff2b2b'
green = '0x98fb98'
yellow = '0x87ceff'
blue = '0xcd853f'
magenta = '0xffdead'
cyan = '0xffa0a0'
white = '0xcdbb9b'

# Bright colors
[colors.bright]
black = '0x7d776c'
red = '0xff5555'
green = '0x55ff55'
yellow = '0xffff55'
blue = '0x87ceff'
magenta = '0xff55ff'
cyan = '0xffd700'
white = '0xffffff'

[[colors.indexed_colors]]
index = 16
color = "0xf0e68c"

[[colors.indexed_colors]]
index = 17
color = "0x7f1515"

[[colors.indexed_colors]]
index = 18
color = "0x4d4d4d"

[[colors.indexed_colors]]
index = 19
color = "0x555555"

[[colors.indexed_colors]]
index = 20
color = "0xa59984"

[[colors.indexed_colors]]
index = 21
color = "0xf5deb3"

