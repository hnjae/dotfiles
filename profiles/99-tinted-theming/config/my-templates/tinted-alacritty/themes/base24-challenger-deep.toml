# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Challenger Deep - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x1e1c31'
foreground = '0x929bb6'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x1e1c31'
cursor = '0x929bb6'

[colors.normal]
black = '0x1e1c31'
red = '0xff5458'
green = '0x62d196'
yellow = '0x91ddff'
blue = '0x65b2ff'
magenta = '0x906cff'
cyan = '0x63f2f1'
white = '0x929bb6'

# Bright colors
[colors.bright]
black = '0x6a6c8a'
red = '0xff8080'
green = '0x95ffa4'
yellow = '0xffe9aa'
blue = '0x91ddff'
magenta = '0xc991e1'
cyan = '0xaaffe4'
white = '0xcbe3e7'

[[colors.indexed_colors]]
index = 16
color = "0xffb378"

[[colors.indexed_colors]]
index = 17
color = "0x7f2a2c"

[[colors.indexed_colors]]
index = 18
color = "0x141127"

[[colors.indexed_colors]]
index = 19
color = "0x565575"

[[colors.indexed_colors]]
index = 20
color = "0x7e84a0"

[[colors.indexed_colors]]
index = 21
color = "0xa6b3cc"

