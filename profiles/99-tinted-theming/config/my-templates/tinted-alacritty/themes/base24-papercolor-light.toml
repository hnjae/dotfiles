# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 PaperColor Light - alacritty color config
# Scheme by Nguyen Nguyen (https://github.com/NLKNguyen/papercolor-theme)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0xeeeeee'
foreground = '0x444444'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0xeeeeee'
cursor = '0x444444'

[colors.normal]
black = '0xeeeeee'
red = '0xaf0000'
green = '0x008700'
yellow = '0x5f8700'
blue = '0x0087af'
magenta = '0x8700af'
cyan = '0xd75f00'
white = '0x444444'

# Bright colors
[colors.bright]
black = '0x878787'
red = '0xd70000'
green = '0x87af00'
yellow = '0xff00af'
blue = '0xff8700'
magenta = '0x5fafff'
cyan = '0x00af00'
white = '0x0087af'

[[colors.indexed_colors]]
index = 16
color = "0xd70087"

[[colors.indexed_colors]]
index = 17
color = "0x005faf"

[[colors.indexed_colors]]
index = 18
color = "0xe4e4e4"

[[colors.indexed_colors]]
index = 19
color = "0xd0d0d0"

[[colors.indexed_colors]]
index = 20
color = "0xb2b2b2"

[[colors.indexed_colors]]
index = 21
color = "0x005f87"

