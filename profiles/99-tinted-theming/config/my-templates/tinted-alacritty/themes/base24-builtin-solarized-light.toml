# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Builtin Solarized Light - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0xfdf6e3'
foreground = '0xb2b8ad'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0xfdf6e3'
cursor = '0xb2b8ad'

[colors.normal]
black = '0xfdf6e3'
red = '0xdc322f'
green = '0x859900'
yellow = '0x839496'
blue = '0x268bd2'
magenta = '0xd33682'
cyan = '0x2aa198'
white = '0xb2b8ad'

# Bright colors
[colors.bright]
black = '0x3b5a5d'
red = '0xcb4b16'
green = '0x586e75'
yellow = '0x657b83'
blue = '0x839496'
magenta = '0x6c71c4'
cyan = '0x93a1a1'
white = '0xfdf6e3'

[[colors.indexed_colors]]
index = 16
color = "0xb58900"

[[colors.indexed_colors]]
index = 17
color = "0x6e1917"

[[colors.indexed_colors]]
index = 18
color = "0x073642"

[[colors.indexed_colors]]
index = 19
color = "0x002b36"

[[colors.indexed_colors]]
index = 20
color = "0x778985"

[[colors.indexed_colors]]
index = 21
color = "0xeee8d5"

