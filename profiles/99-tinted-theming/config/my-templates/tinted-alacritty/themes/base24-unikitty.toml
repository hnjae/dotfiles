# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Unikitty - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0xff7ad3'
foreground = '0xb9b1b8'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0xff7ad3'
cursor = '0xb9b1b8'

[colors.normal]
black = '0xff7ad3'
red = '0xa80f20'
green = '0xbafc8b'
yellow = '0xeedf4b'
blue = '0x145fcd'
magenta = '0xff36a2'
cyan = '0x6bd0bc'
white = '0xb9b1b8'

# Bright colors
[colors.bright]
black = '0x696769'
red = '0xd81329'
green = '0xd2ffaf'
yellow = '0xffee50'
blue = '0x0074ea'
magenta = '0xfdd5e5'
cyan = '0x79ebd5'
white = '0xfff2fd'

[[colors.indexed_colors]]
index = 16
color = "0xeeaa4b"

[[colors.indexed_colors]]
index = 17
color = "0x540710"

[[colors.indexed_colors]]
index = 18
color = "0x0c0c0c"

[[colors.indexed_colors]]
index = 19
color = "0x424242"

[[colors.indexed_colors]]
index = 20
color = "0x918c91"

[[colors.indexed_colors]]
index = 21
color = "0xe1d6e0"

