# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Idle Toes - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x323232'
foreground = '0xc7c7c5'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x323232'
cursor = '0xc7c7c5'

[colors.normal]
black = '0x323232'
red = '0xd25252'
green = '0x7fe173'
yellow = '0x5eb7f7'
blue = '0x4098ff'
magenta = '0xf57fff'
cyan = '0xbed6ff'
white = '0xc7c7c5'

# Bright colors
[colors.bright]
black = '0x797979'
red = '0xf07070'
green = '0x9dff90'
yellow = '0xffe48b'
blue = '0x5eb7f7'
magenta = '0xff9dff'
cyan = '0xdcf4ff'
white = '0xffffff'

[[colors.indexed_colors]]
index = 16
color = "0xffc66d"

[[colors.indexed_colors]]
index = 17
color = "0x692929"

[[colors.indexed_colors]]
index = 18
color = "0x323232"

[[colors.indexed_colors]]
index = 19
color = "0x535353"

[[colors.indexed_colors]]
index = 20
color = "0xa0a09f"

[[colors.indexed_colors]]
index = 21
color = "0xeeeeec"

