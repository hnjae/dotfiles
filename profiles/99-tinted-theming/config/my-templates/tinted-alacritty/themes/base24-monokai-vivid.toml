# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Monokai Vivid - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x121212'
foreground = '0xdfdfdf'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x121212'
cursor = '0xdfdfdf'

[colors.normal]
black = '0x121212'
red = '0xfa2834'
green = '0x97e123'
yellow = '0xfef20a'
blue = '0x0442fe'
magenta = '0xf800f8'
cyan = '0x01b6ed'
white = '0xdfdfdf'

# Bright colors
[colors.bright]
black = '0x525252'
red = '0xf5669c'
green = '0xb0e05e'
yellow = '0xfef26c'
blue = '0x0442fe'
magenta = '0xf200f5'
cyan = '0x50cdfe'
white = '0xffffff'

[[colors.indexed_colors]]
index = 16
color = "0xfec50a"

[[colors.indexed_colors]]
index = 17
color = "0x7d141a"

[[colors.indexed_colors]]
index = 18
color = "0x323232"

[[colors.indexed_colors]]
index = 19
color = "0x424242"

[[colors.indexed_colors]]
index = 20
color = "0xc0c0c0"

[[colors.indexed_colors]]
index = 21
color = "0xf1f1f1"

# vi:ft=toml
