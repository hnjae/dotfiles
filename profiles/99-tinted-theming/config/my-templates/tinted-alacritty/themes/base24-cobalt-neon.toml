# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Cobalt Neon - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x142838'
foreground = '0xcc72a6'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x142838'
cursor = '0xcc72a6'

[colors.normal]
black = '0x142838'
red = '0xff2320'
green = '0x3aa5ff'
yellow = '0x3c7dd2'
blue = '0x8ff586'
magenta = '0x781aa0'
cyan = '0x8ff586'
white = '0xcc72a6'

# Bright colors
[colors.bright]
black = '0xeeca92'
red = '0xd4312e'
green = '0x8ff586'
yellow = '0xe9f06d'
blue = '0x3c7dd2'
magenta = '0x8230a7'
cyan = '0x6cbc67'
white = '0x8ff586'

[[colors.indexed_colors]]
index = 16
color = "0xe9e75c"

[[colors.indexed_colors]]
index = 17
color = "0x7f1110"

[[colors.indexed_colors]]
index = 18
color = "0x142630"

[[colors.indexed_colors]]
index = 19
color = "0xfff688"

[[colors.indexed_colors]]
index = 20
color = "0xdd9e9c"

[[colors.indexed_colors]]
index = 21
color = "0xba45b1"

