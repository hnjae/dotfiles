# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Hivacruz - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x132537'
foreground = '0x8c92ac'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x132537'
cursor = '0x8c92ac'

[colors.normal]
black = '0x132537'
red = '0xc94922'
green = '0xac9739'
yellow = '0x898ea4'
blue = '0x3d8fd1'
magenta = '0x6679cc'
cyan = '0x22a2c9'
white = '0x8c92ac'

# Bright colors
[colors.bright]
black = '0x767d9c'
red = '0xc76b29'
green = '0x73ad43'
yellow = '0x5e6687'
blue = '0x898ea4'
magenta = '0xdfe2f1'
cyan = '0x9c637a'
white = '0xf5f7ff'

[[colors.indexed_colors]]
index = 16
color = "0xc08b30"

[[colors.indexed_colors]]
index = 17
color = "0x642411"

[[colors.indexed_colors]]
index = 18
color = "0x202746"

[[colors.indexed_colors]]
index = 19
color = "0x6b7394"

[[colors.indexed_colors]]
index = 20
color = "0x8188a4"

[[colors.indexed_colors]]
index = 21
color = "0x979db4"

