# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Gruvbox Dark - alacritty color config
# Scheme by Tinted Theming (https://github.com/tinted-theming), morhetz (https://github.com/morhetz/gruvbox)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x282828'
foreground = '0xebdbb2'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x282828'
cursor = '0xebdbb2'

[colors.normal]
black = '0x282828'
red = '0xcc241d'
green = '0x98971a'
yellow = '0xd79921'
blue = '0x458588'
magenta = '0xb16286'
cyan = '0x689d6a'
white = '0xebdbb2'

# Bright colors
[colors.bright]
black = '0x665c54'
red = '0xfb4934'
green = '0xb8bb26'
yellow = '0xfabd2f'
blue = '0x83a598'
magenta = '0xd3869b'
cyan = '0x8ec07c'
white = '0xf9f5d7'

[[colors.indexed_colors]]
index = 16
color = "0xd65d0e"

[[colors.indexed_colors]]
index = 17
color = "0x9d0006"

[[colors.indexed_colors]]
index = 18
color = "0x3c3836"

[[colors.indexed_colors]]
index = 19
color = "0x504945"

[[colors.indexed_colors]]
index = 20
color = "0x928374"

[[colors.indexed_colors]]
index = 21
color = "0xfbf1c7"

