# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Piatto Light - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0xffffff'
foreground = '0x515151'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0xffffff'
cursor = '0x515151'

[colors.normal]
black = '0xffffff'
red = '0xb23771'
green = '0x66781e'
yellow = '0xcda434'
blue = '0x3c5ea8'
magenta = '0xa454b2'
cyan = '0x1e7878'
white = '0x515151'

# Bright colors
[colors.bright]
black = '0xc1c1c1'
red = '0xdb3365'
green = '0x829429'
yellow = '0xcd6f34'
blue = '0x3c5ea8'
magenta = '0xa454b2'
cyan = '0x175e5e'
white = '0x212121'

[[colors.indexed_colors]]
index = 16
color = "0xcd6f34"

[[colors.indexed_colors]]
index = 17
color = "0x591b38"

[[colors.indexed_colors]]
index = 18
color = "0xf1f1f1"

[[colors.indexed_colors]]
index = 19
color = "0xe1e1e1"

[[colors.indexed_colors]]
index = 20
color = "0x717171"

[[colors.indexed_colors]]
index = 21
color = "0x414141"

