# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Flexoki Dark - alacritty color config
# Scheme by Steph Ango (https://github.com/kepano/flexoki)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x100f0f'
foreground = '0xcecdc3'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x100f0f'
cursor = '0xcecdc3'

[colors.normal]
black = '0x100f0f'
red = '0xd14d41'
green = '0x879a39'
yellow = '0xd0a215'
blue = '0x4385be'
magenta = '0x8b7ec8'
cyan = '0x3aa99f'
white = '0xcecdc3'

# Bright colors
[colors.bright]
black = '0x575653'
red = '0xaf3029'
green = '0xad8301'
yellow = '0xbc5215'
blue = '0x24837b'
magenta = '0x205ea6'
cyan = '0x66800b'
white = '0xfffcf0'

[[colors.indexed_colors]]
index = 16
color = "0xda702c"

[[colors.indexed_colors]]
index = 17
color = "0xce5d97"

[[colors.indexed_colors]]
index = 18
color = "0x1c1b1a"

[[colors.indexed_colors]]
index = 19
color = "0x282726"

[[colors.indexed_colors]]
index = 20
color = "0x878580"

[[colors.indexed_colors]]
index = 21
color = "0xe6e4d9"

