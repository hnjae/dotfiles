# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Solarized Dark Higher Contrast - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x001e26'
foreground = '0xaec2ba'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x001e26'
cursor = '0xaec2ba'

[colors.normal]
black = '0x001e26'
red = '0xd01b24'
green = '0x6bbe6c'
yellow = '0x178dc7'
blue = '0x2075c7'
magenta = '0xc61b6e'
cyan = '0x259185'
white = '0xaec2ba'

# Bright colors
[colors.bright]
black = '0x3a8298'
red = '0xf4153b'
green = '0x50ee84'
yellow = '0xb17e28'
blue = '0x178dc7'
magenta = '0xe14d8e'
cyan = '0x00b29e'
white = '0xfcf4dc'

[[colors.indexed_colors]]
index = 16
color = "0xa57705"

[[colors.indexed_colors]]
index = 17
color = "0x680d12"

[[colors.indexed_colors]]
index = 18
color = "0x002731"

[[colors.indexed_colors]]
index = 19
color = "0x006388"

[[colors.indexed_colors]]
index = 20
color = "0x74a2a9"

[[colors.indexed_colors]]
index = 21
color = "0xe9e2cb"

