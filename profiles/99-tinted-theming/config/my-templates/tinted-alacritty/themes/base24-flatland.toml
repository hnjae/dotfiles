# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Flatland - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x1c1e20'
foreground = '0xc5c6c4'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x1c1e20'
cursor = '0xc5c6c4'

[colors.normal]
black = '0x1c1e20'
red = '0xf18238'
green = '0x9ed264'
yellow = '0x61b8d0'
blue = '0x4f96be'
magenta = '0x695abb'
cyan = '0xd53864'
white = '0xc5c6c4'

# Bright colors
[colors.bright]
black = '0x545552'
red = '0xd12a24'
green = '0xa7d32c'
yellow = '0xff8948'
blue = '0x61b8d0'
magenta = '0x695abb'
cyan = '0xd53864'
white = '0xfefffe'

[[colors.indexed_colors]]
index = 16
color = "0xf3ef6d"

[[colors.indexed_colors]]
index = 17
color = "0x78411c"

[[colors.indexed_colors]]
index = 18
color = "0x1c1d19"

[[colors.indexed_colors]]
index = 19
color = "0x1c1d19"

[[colors.indexed_colors]]
index = 20
color = "0x8d8e8b"

[[colors.indexed_colors]]
index = 21
color = "0xfefffe"

# vi:ft=toml
