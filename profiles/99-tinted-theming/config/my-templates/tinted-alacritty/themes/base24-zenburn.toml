# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Zenburn - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x3f3f3f'
foreground = '0xc1c9b9'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x3f3f3f'
cursor = '0xc1c9b9'

[colors.normal]
black = '0x3f3f3f'
red = '0x705050'
green = '0x60b48a'
yellow = '0x94bff3'
blue = '0x506070'
magenta = '0xdc8cc3'
cyan = '0x8cd0d3'
white = '0xc1c9b9'

# Bright colors
[colors.bright]
black = '0x8ba393'
red = '0xdca3a3'
green = '0xc3bf9f'
yellow = '0xe0cf9f'
blue = '0x94bff3'
magenta = '0xec93d3'
cyan = '0x93e0e3'
white = '0xffffff'

[[colors.indexed_colors]]
index = 16
color = "0xf0dfaf"

[[colors.indexed_colors]]
index = 17
color = "0x382828"

[[colors.indexed_colors]]
index = 18
color = "0x4d4d4d"

[[colors.indexed_colors]]
index = 19
color = "0x709080"

[[colors.indexed_colors]]
index = 20
color = "0xa6b6a6"

[[colors.indexed_colors]]
index = 21
color = "0xdcdccc"

