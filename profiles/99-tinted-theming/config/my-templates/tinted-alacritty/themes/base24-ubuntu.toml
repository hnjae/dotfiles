# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Ubuntu - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x300a24'
foreground = '0xb3b7b0'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x300a24'
cursor = '0xb3b7b0'

[colors.normal]
black = '0x300a24'
red = '0xcc0000'
green = '0x4e9a06'
yellow = '0x729fcf'
blue = '0x3465a4'
magenta = '0x75507b'
cyan = '0x06989a'
white = '0xb3b7b0'

# Bright colors
[colors.bright]
black = '0x747772'
red = '0xef2929'
green = '0x8ae234'
yellow = '0xfce94f'
blue = '0x729fcf'
magenta = '0xad7fa8'
cyan = '0x34e2e2'
white = '0xeeeeec'

[[colors.indexed_colors]]
index = 16
color = "0xc4a000"

[[colors.indexed_colors]]
index = 17
color = "0x660000"

[[colors.indexed_colors]]
index = 18
color = "0x2e3436"

[[colors.indexed_colors]]
index = 19
color = "0x555753"

[[colors.indexed_colors]]
index = 20
color = "0x949791"

[[colors.indexed_colors]]
index = 21
color = "0xd3d7cf"

