# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Cyberdyne - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x151144'
foreground = '0xc0c0c0'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x151144'
cursor = '0xc0c0c0'

[colors.normal]
black = '0x151144'
red = '0xff8272'
green = '0x00c172'
yellow = '0xc1e3fe'
blue = '0x0071cf'
magenta = '0xff8ffd'
cyan = '0x6bffdc'
white = '0xc0c0c0'

# Bright colors
[colors.bright]
black = '0x5e5e5e'
red = '0xffc4bd'
green = '0xd6fcb9'
yellow = '0xfefdd5'
blue = '0xc1e3fe'
magenta = '0xffb1fe'
cyan = '0xe5e6fe'
white = '0xfeffff'

[[colors.indexed_colors]]
index = 16
color = "0xd2a700"

[[colors.indexed_colors]]
index = 17
color = "0x7f4139"

[[colors.indexed_colors]]
index = 18
color = "0x080808"

[[colors.indexed_colors]]
index = 19
color = "0x2d2d2d"

[[colors.indexed_colors]]
index = 20
color = "0x8f8f8f"

[[colors.indexed_colors]]
index = 21
color = "0xf1f1f1"

# vi:ft=toml
