# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Ayu Dark - alacritty color config
# Scheme by Tinted Theming (https://github.com/tinted-theming), Ayu Theme (https://github.com/ayu-theme)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x0b0e14'
foreground = '0xe6e1cf'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x0b0e14'
cursor = '0xe6e1cf'

[colors.normal]
black = '0x0b0e14'
red = '0xf07178'
green = '0xaad94c'
yellow = '0xffb454'
blue = '0x59c2ff'
magenta = '0xd2a6ff'
cyan = '0x95e6cb'
white = '0xe6e1cf'

# Bright colors
[colors.bright]
black = '0x3e4b59'
red = '0xf26d78'
green = '0x7fd962'
yellow = '0xe6b673'
blue = '0x73b8ff'
magenta = '0xddbcff'
cyan = '0x39bae6'
white = '0xf2f0e7'

[[colors.indexed_colors]]
index = 16
color = "0xff8f40"

[[colors.indexed_colors]]
index = 17
color = "0xe6b450"

[[colors.indexed_colors]]
index = 18
color = "0x131721"

[[colors.indexed_colors]]
index = 19
color = "0x202229"

[[colors.indexed_colors]]
index = 20
color = "0xbfbdb6"

[[colors.indexed_colors]]
index = 21
color = "0xece8db"

