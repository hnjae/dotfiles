# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Mathias - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x000000'
foreground = '0xcacaca'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x000000'
cursor = '0xcacaca'

[colors.normal]
black = '0x000000'
red = '0xe52222'
green = '0xa6e32d'
yellow = '0x5555ff'
blue = '0xc48dff'
magenta = '0xfa2573'
cyan = '0x67d9f0'
white = '0xcacaca'

# Bright colors
[colors.bright]
black = '0x7c7c7c'
red = '0xff5555'
green = '0x55ff55'
yellow = '0xffff55'
blue = '0x5555ff'
magenta = '0xff55ff'
cyan = '0x55ffff'
white = '0xffffff'

[[colors.indexed_colors]]
index = 16
color = "0xfc951e"

[[colors.indexed_colors]]
index = 17
color = "0x721111"

[[colors.indexed_colors]]
index = 18
color = "0x000000"

[[colors.indexed_colors]]
index = 19
color = "0x555555"

[[colors.indexed_colors]]
index = 20
color = "0xa3a3a3"

[[colors.indexed_colors]]
index = 21
color = "0xf2f2f2"

