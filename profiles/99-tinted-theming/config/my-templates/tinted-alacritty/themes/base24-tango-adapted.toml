# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Tango Adapted - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0xfeffff'
foreground = '0x4f4f4f'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0xfeffff'
cursor = '0x4f4f4f'

[colors.normal]
black = '0xfeffff'
red = '0xff0000'
green = '0x59d500'
yellow = '0xefca00'
blue = '0x00a1ff'
magenta = '0xc17ecb'
cyan = '0x00d0d6'
white = '0x4f4f4f'

# Bright colors
[colors.bright]
black = '0xcccccc'
red = '0xff0012'
green = '0x93fe00'
yellow = '0xfff021'
blue = '0x88c9ff'
magenta = '0xe8a6e1'
cyan = '0x00fdff'
white = '0x000000'

[[colors.indexed_colors]]
index = 16
color = "0xef9b00"

[[colors.indexed_colors]]
index = 17
color = "0x7f0000"

[[colors.indexed_colors]]
index = 18
color = "0xf1f1f1"

[[colors.indexed_colors]]
index = 19
color = "0xdcdcdc"

[[colors.indexed_colors]]
index = 20
color = "0x757575"

[[colors.indexed_colors]]
index = 21
color = "0x323232"

# vi:ft=toml
