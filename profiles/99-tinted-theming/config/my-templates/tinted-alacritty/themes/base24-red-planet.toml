# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Red Planet - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x222222'
foreground = '0xa4998c'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x222222'
cursor = '0xa4998c'

[colors.normal]
black = '0x222222'
red = '0x8c3432'
green = '0x728271'
yellow = '0x60827e'
blue = '0x69809e'
magenta = '0x896492'
cyan = '0x5b8390'
white = '0xa4998c'

# Bright colors
[colors.bright]
black = '0x7b7773'
red = '0xb55242'
green = '0x869985'
yellow = '0xebeb91'
blue = '0x60827e'
magenta = '0xde4873'
cyan = '0x38add8'
white = '0xd6bfb8'

[[colors.indexed_colors]]
index = 16
color = "0xe8bf6a"

[[colors.indexed_colors]]
index = 17
color = "0x461a19"

[[colors.indexed_colors]]
index = 18
color = "0x201f1f"

[[colors.indexed_colors]]
index = 19
color = "0x676767"

[[colors.indexed_colors]]
index = 20
color = "0x908880"

[[colors.indexed_colors]]
index = 21
color = "0xb9aa99"

