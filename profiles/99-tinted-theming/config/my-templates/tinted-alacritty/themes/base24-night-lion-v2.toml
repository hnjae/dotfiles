# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Night Lion V2 - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x171717'
foreground = '0xa1a1a1'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x171717'
cursor = '0xa1a1a1'

[colors.normal]
black = '0x171717'
red = '0xbb0000'
green = '0x03f622'
yellow = '0x62cae7'
blue = '0x63d0f0'
magenta = '0xce6fda'
cyan = '0x00d9df'
white = '0xa1a1a1'

# Bright colors
[colors.bright]
black = '0x6e6e6e'
red = '0xff5555'
green = '0x7df61c'
yellow = '0xffff55'
blue = '0x62cae7'
magenta = '0xff9af5'
cyan = '0x00ccd7'
white = '0xffffff'

[[colors.indexed_colors]]
index = 16
color = "0xf2f067"

[[colors.indexed_colors]]
index = 17
color = "0x5d0000"

[[colors.indexed_colors]]
index = 18
color = "0x4c4c4c"

[[colors.indexed_colors]]
index = 19
color = "0x555555"

[[colors.indexed_colors]]
index = 20
color = "0x888888"

[[colors.indexed_colors]]
index = 21
color = "0xbbbbbb"

