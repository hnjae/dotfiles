# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Pnevma - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x1c1c1c'
foreground = '0xaeaead'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x1c1c1c'
cursor = '0xaeaead'

[colors.normal]
black = '0x1c1c1c'
red = '0xa36666'
green = '0x90a57d'
yellow = '0xa1bdce'
blue = '0x7fa5bd'
magenta = '0xc79ec4'
cyan = '0x8adbb4'
white = '0xaeaead'

# Bright colors
[colors.bright]
black = '0x6b6a67'
red = '0xd78787'
green = '0xafbea2'
yellow = '0xe4c9af'
blue = '0xa1bdce'
magenta = '0xd7beda'
cyan = '0xb1e7dd'
white = '0xefefef'

[[colors.indexed_colors]]
index = 16
color = "0xd7af87"

[[colors.indexed_colors]]
index = 17
color = "0x513333"

[[colors.indexed_colors]]
index = 18
color = "0x2f2e2d"

[[colors.indexed_colors]]
index = 19
color = "0x4a4845"

[[colors.indexed_colors]]
index = 20
color = "0x8d8c8a"

[[colors.indexed_colors]]
index = 21
color = "0xd0d0d0"

# vi:ft=toml
