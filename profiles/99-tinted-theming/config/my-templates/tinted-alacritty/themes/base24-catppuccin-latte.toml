# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Catppuccin Latte - alacritty color config
# Scheme by https://github.com/catppuccin/catppuccin

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0xeff1f5'
foreground = '0x4c4f69'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0xeff1f5'
cursor = '0x4c4f69'

[colors.normal]
black = '0xeff1f5'
red = '0xd20f39'
green = '0x40a02b'
yellow = '0xdf8e1d'
blue = '0x1e66f5'
magenta = '0x8839ef'
cyan = '0x179299'
white = '0x4c4f69'

# Bright colors
[colors.bright]
black = '0xbcc0cc'
red = '0xe64553'
green = '0x40a02b'
yellow = '0xdc8a78'
blue = '0x209fb5'
magenta = '0xea76cb'
cyan = '0x04a5e5'
white = '0x7287fd'

[[colors.indexed_colors]]
index = 16
color = "0xfe640b"

[[colors.indexed_colors]]
index = 17
color = "0xdd7878"

[[colors.indexed_colors]]
index = 18
color = "0xe6e9ef"

[[colors.indexed_colors]]
index = 19
color = "0xccd0da"

[[colors.indexed_colors]]
index = 20
color = "0xacb0be"

[[colors.indexed_colors]]
index = 21
color = "0xdc8a78"

