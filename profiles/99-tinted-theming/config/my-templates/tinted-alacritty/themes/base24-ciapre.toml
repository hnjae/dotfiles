# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Ciapre - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x181c27'
foreground = '0x978f73'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x181c27'
cursor = '0x978f73'

[colors.normal]
black = '0x181c27'
red = '0x800009'
green = '0x48513b'
yellow = '0x2f97c6'
blue = '0x566d8c'
magenta = '0x724c7c'
cyan = '0x5b4f4a'
white = '0x978f73'

# Bright colors
[colors.bright]
black = '0x6b685f'
red = '0xab3834'
green = '0xa6a65d'
yellow = '0xdcde7b'
blue = '0x2f97c6'
magenta = '0xd33060'
cyan = '0xf3dab1'
white = '0xf3f3f3'

[[colors.indexed_colors]]
index = 16
color = "0xcc8a3e"

[[colors.indexed_colors]]
index = 17
color = "0x400004"

[[colors.indexed_colors]]
index = 18
color = "0x181818"

[[colors.indexed_colors]]
index = 19
color = "0x555555"

[[colors.indexed_colors]]
index = 20
color = "0x817c69"

[[colors.indexed_colors]]
index = 21
color = "0xada37e"

