# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Nocturnal Winter - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x0d0d17'
foreground = '0xdcdcdc'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x0d0d17'
cursor = '0xdcdcdc'

[colors.normal]
black = '0x0d0d17'
red = '0xf12d52'
green = '0x08cd7d'
yellow = '0x6095fe'
blue = '0x3081df'
magenta = '0xfe2a6c'
cyan = '0x09c87a'
white = '0xdcdcdc'

# Bright colors
[colors.bright]
black = '0x9e9e9e'
red = '0xf16c85'
green = '0x0ae78d'
yellow = '0xfefb67'
blue = '0x6095fe'
magenta = '0xff78a2'
cyan = '0x0ae78d'
white = '0xffffff'

[[colors.indexed_colors]]
index = 16
color = "0xf5f079"

[[colors.indexed_colors]]
index = 17
color = "0x781629"

[[colors.indexed_colors]]
index = 18
color = "0x4c4c4c"

[[colors.indexed_colors]]
index = 19
color = "0x7f7f7f"

[[colors.indexed_colors]]
index = 20
color = "0xbdbdbd"

[[colors.indexed_colors]]
index = 21
color = "0xfbfbfb"

# vi:ft=toml
