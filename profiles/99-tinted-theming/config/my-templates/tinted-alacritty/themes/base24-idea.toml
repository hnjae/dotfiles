# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Idea - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x202020'
foreground = '0x515151'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x202020'
cursor = '0x515151'

[colors.normal]
black = '0x202020'
red = '0xfb5255'
green = '0x98b61b'
yellow = '0x6c9bed'
blue = '0x437ee6'
magenta = '0x9d73b0'
cyan = '0x248886'
white = '0x515151'

# Bright colors
[colors.bright]
black = '0xc5c5c5'
red = '0xfc6f72'
green = '0x98b61b'
yellow = '0xffff0a'
blue = '0x6c9bed'
magenta = '0xfc7efe'
cyan = '0x248886'
white = '0x171717'

[[colors.indexed_colors]]
index = 16
color = "0xccb343"

[[colors.indexed_colors]]
index = 17
color = "0x7d292a"

[[colors.indexed_colors]]
index = 18
color = "0xacacac"

[[colors.indexed_colors]]
index = 19
color = "0xfffefe"

[[colors.indexed_colors]]
index = 20
color = "0x8b8b8b"

[[colors.indexed_colors]]
index = 21
color = "0x171717"

