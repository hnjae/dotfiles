# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Breeze - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x31363b'
foreground = '0xd3d7d8'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x31363b'
cursor = '0xd3d7d8'

[colors.normal]
black = '0x31363b'
red = '0xed1515'
green = '0x11d116'
yellow = '0x3daee9'
blue = '0x1d99f3'
magenta = '0x9b59b6'
cyan = '0x1abc9c'
white = '0xd3d7d8'

# Bright colors
[colors.bright]
black = '0x9ba5a6'
red = '0xc0392b'
green = '0x1cdc9a'
yellow = '0xfdbc4b'
blue = '0x3daee9'
magenta = '0x8e44ad'
cyan = '0x16a085'
white = '0xfcfcfc'

[[colors.indexed_colors]]
index = 16
color = "0xf67400"

[[colors.indexed_colors]]
index = 17
color = "0x760a0a"

[[colors.indexed_colors]]
index = 18
color = "0x31363b"

[[colors.indexed_colors]]
index = 19
color = "0x7f8c8d"

[[colors.indexed_colors]]
index = 20
color = "0xb7bebf"

[[colors.indexed_colors]]
index = 21
color = "0xeff0f1"

