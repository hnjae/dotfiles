# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 0x96f - alacritty color config
# Scheme by Filip Janevski (https://0x96f.dev/theme)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x262427'
foreground = '0xfcfcfc'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x262427'
cursor = '0xfcfcfc'

[colors.normal]
black = '0x262427'
red = '0xff7272'
green = '0xbcdf59'
yellow = '0xffca58'
blue = '0x49cae4'
magenta = '0xa093e2'
cyan = '0xaee8f4'
white = '0xfcfcfc'

# Bright colors
[colors.bright]
black = '0x676567'
red = '0xff8787'
green = '0xc6e472'
yellow = '0xffd271'
blue = '0x64d2e8'
magenta = '0xaea3e6'
cyan = '0xbaebf6'
white = '0xfcfcfc'

[[colors.indexed_colors]]
index = 16
color = "0xfc9d6f"

[[colors.indexed_colors]]
index = 17
color = "0xff8787"

[[colors.indexed_colors]]
index = 18
color = "0x3b393c"

[[colors.indexed_colors]]
index = 19
color = "0x514f52"

[[colors.indexed_colors]]
index = 20
color = "0x7c7b7d"

[[colors.indexed_colors]]
index = 21
color = "0xeae9eb"

