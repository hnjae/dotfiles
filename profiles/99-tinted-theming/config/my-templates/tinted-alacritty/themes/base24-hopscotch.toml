# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Hopscotch - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x322931'
foreground = '0xa9a4a8'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x322931'
cursor = '0xa9a4a8'

[colors.normal]
black = '0x322931'
red = '0xdd464c'
green = '0x8fc13e'
yellow = '0x989498'
blue = '0x1290bf'
magenta = '0xc85e7c'
cyan = '0x149b93'
white = '0xa9a4a8'

# Bright colors
[colors.bright]
black = '0x898388'
red = '0xfd8b19'
green = '0x433b42'
yellow = '0x5c545b'
blue = '0x989498'
magenta = '0xd5d3d5'
cyan = '0xb33508'
white = '0xffffff'

[[colors.indexed_colors]]
index = 16
color = "0xfdcc59"

[[colors.indexed_colors]]
index = 17
color = "0x6e2326"

[[colors.indexed_colors]]
index = 18
color = "0x322931"

[[colors.indexed_colors]]
index = 19
color = "0x797379"

[[colors.indexed_colors]]
index = 20
color = "0x999498"

[[colors.indexed_colors]]
index = 21
color = "0xb9b5b8"

