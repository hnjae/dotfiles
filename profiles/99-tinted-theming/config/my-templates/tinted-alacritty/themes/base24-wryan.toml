# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Wryan - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x101010'
foreground = '0x768488'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x101010'
cursor = '0x768488'

[colors.normal]
black = '0x101010'
red = '0x8c4665'
green = '0x287373'
yellow = '0x477ab3'
blue = '0x395573'
magenta = '0x5e468c'
cyan = '0x31658c'
white = '0x768488'

# Bright colors
[colors.bright]
black = '0x505456'
red = '0xbf4d80'
green = '0x53a6a6'
yellow = '0x9e9ecb'
blue = '0x477ab3'
magenta = '0x7e62b3'
cyan = '0x6096bf'
white = '0xc0c0c0'

[[colors.indexed_colors]]
index = 16
color = "0x7c7c99"

[[colors.indexed_colors]]
index = 17
color = "0x462332"

[[colors.indexed_colors]]
index = 18
color = "0x333333"

[[colors.indexed_colors]]
index = 19
color = "0x3d3d3d"

[[colors.indexed_colors]]
index = 20
color = "0x636c6f"

[[colors.indexed_colors]]
index = 21
color = "0x899ca1"

