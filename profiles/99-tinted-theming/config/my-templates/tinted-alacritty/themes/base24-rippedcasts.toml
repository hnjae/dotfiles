# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Rippedcasts - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x2b2b2b'
foreground = '0xa8a8a8'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x2b2b2b'
cursor = '0xa8a8a8'

[colors.normal]
black = '0x2b2b2b'
red = '0xcdaf95'
green = '0xa7ff60'
yellow = '0x86bdc9'
blue = '0x75a5b0'
magenta = '0xff73fd'
cyan = '0x59647e'
white = '0xa8a8a8'

# Bright colors
[colors.bright]
black = '0x7c7c7c'
red = '0xeecbad'
green = '0xbcee68'
yellow = '0xe5e500'
blue = '0x86bdc9'
magenta = '0xe500e5'
cyan = '0x8c9bc3'
white = '0xe5e5e5'

[[colors.indexed_colors]]
index = 16
color = "0xbfbb1f"

[[colors.indexed_colors]]
index = 17
color = "0x66574a"

[[colors.indexed_colors]]
index = 18
color = "0x000000"

[[colors.indexed_colors]]
index = 19
color = "0x666666"

[[colors.indexed_colors]]
index = 20
color = "0x929292"

[[colors.indexed_colors]]
index = 21
color = "0xbfbfbf"

