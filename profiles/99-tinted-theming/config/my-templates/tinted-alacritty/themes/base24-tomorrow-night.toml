# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Tomorrow Night - alacritty color config
# Scheme by Cody Buell (https://github.com/codybuell)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x1d1f21'
foreground = '0xc5c8c6'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x1d1f21'
cursor = '0xc5c8c6'

[colors.normal]
black = '0x1d1f21'
red = '0xcc6666'
green = '0xb5bd68'
yellow = '0xf0c674'
blue = '0x81a2be'
magenta = '0xb294bb'
cyan = '0x8abeb7'
white = '0xc5c8c6'

# Bright colors
[colors.bright]
black = '0x969896'
red = '0xe74c3c'
green = '0xb8d4b3'
yellow = '0xf7dc6f'
blue = '0x85c1e9'
magenta = '0xd7a3ca'
cyan = '0x95d3ce'
white = '0xffffff'

[[colors.indexed_colors]]
index = 16
color = "0xde935f"

[[colors.indexed_colors]]
index = 17
color = "0xa3685a"

[[colors.indexed_colors]]
index = 18
color = "0x282a2e"

[[colors.indexed_colors]]
index = 19
color = "0x373b41"

[[colors.indexed_colors]]
index = 20
color = "0xb4b7b4"

[[colors.indexed_colors]]
index = 21
color = "0xe0e0e0"

