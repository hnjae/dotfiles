# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Laser - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x030d18'
foreground = '0xd8d8d8'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x030d18'
cursor = '0xd8d8d8'

[colors.normal]
black = '0x030d18'
red = '0xff8272'
green = '0xb4fa72'
yellow = '0xf92883'
blue = '0xfed300'
magenta = '0xff8ffd'
cyan = '0xd0d1fe'
white = '0xd8d8d8'

# Bright colors
[colors.bright]
black = '0xa6a6a6'
red = '0xffc4bd'
green = '0xd6fcb9'
yellow = '0xfefdd5'
blue = '0xf92883'
magenta = '0xffb1fe'
cyan = '0xe5e6fe'
white = '0xfeffff'

[[colors.indexed_colors]]
index = 16
color = "0x09b4bd"

[[colors.indexed_colors]]
index = 17
color = "0x7f4139"

[[colors.indexed_colors]]
index = 18
color = "0x616161"

[[colors.indexed_colors]]
index = 19
color = "0x8e8e8e"

[[colors.indexed_colors]]
index = 20
color = "0xbfbfbf"

[[colors.indexed_colors]]
index = 21
color = "0xf1f1f1"

# vi:ft=toml
