# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Floraverse - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x0e0c15'
foreground = '0xc3af9d'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x0e0c15'
cursor = '0xc3af9d'

[colors.normal]
black = '0x0e0c15'
red = '0x64002c'
green = '0x5d731a'
yellow = '0x40a4cf'
blue = '0x1d6da1'
magenta = '0xb7077e'
cyan = '0x42a38c'
white = '0xc3af9d'

# Bright colors
[colors.bright]
black = '0x634e67'
red = '0xd02063'
green = '0xb4ce59'
yellow = '0xfac357'
blue = '0x40a4cf'
magenta = '0xf12aae'
cyan = '0x62caa8'
white = '0xfff5db'

[[colors.indexed_colors]]
index = 16
color = "0xcd751c"

[[colors.indexed_colors]]
index = 17
color = "0x320016"

[[colors.indexed_colors]]
index = 18
color = "0x08002e"

[[colors.indexed_colors]]
index = 19
color = "0x331e4d"

[[colors.indexed_colors]]
index = 20
color = "0x937f82"

[[colors.indexed_colors]]
index = 21
color = "0xf3e0b8"

