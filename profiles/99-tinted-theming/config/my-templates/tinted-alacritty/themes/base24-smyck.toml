# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Smyck - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x1b1b1b'
foreground = '0x969696'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x1b1b1b'
cursor = '0x969696'

[colors.normal]
black = '0x1b1b1b'
red = '0xb74131'
green = '0x7da900'
yellow = '0x8dcff0'
blue = '0x62a3c4'
magenta = '0xb98acc'
cyan = '0x207383'
white = '0x969696'

# Bright colors
[colors.bright]
black = '0x838383'
red = '0xd6837b'
green = '0xc4f036'
yellow = '0xfee14d'
blue = '0x8dcff0'
magenta = '0xf799ff'
cyan = '0x69d9cf'
white = '0xf7f7f7'

[[colors.indexed_colors]]
index = 16
color = "0xc4a400"

[[colors.indexed_colors]]
index = 17
color = "0x5b2018"

[[colors.indexed_colors]]
index = 18
color = "0x000000"

[[colors.indexed_colors]]
index = 19
color = "0x7a7a7a"

[[colors.indexed_colors]]
index = 20
color = "0x8d8d8d"

[[colors.indexed_colors]]
index = 21
color = "0xa0a0a0"

# vi:ft=toml
