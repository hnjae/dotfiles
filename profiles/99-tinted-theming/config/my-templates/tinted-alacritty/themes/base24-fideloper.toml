# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Fideloper - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x282f32'
foreground = '0xb1b1a3'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x282f32'
cursor = '0xb1b1a3'

[colors.normal]
black = '0x282f32'
red = '0xca1d2c'
green = '0xedb7ab'
yellow = '0x7c84c4'
blue = '0x2e78c1'
magenta = '0xc0226e'
cyan = '0x309185'
white = '0xb1b1a3'

# Bright colors
[colors.bright]
black = '0x415050'
red = '0xd35f5a'
green = '0xd35f5a'
yellow = '0xa86571'
blue = '0x7c84c4'
magenta = '0x5b5db2'
cyan = '0x81908f'
white = '0xfcf4de'

[[colors.indexed_colors]]
index = 16
color = "0xb7aa9a"

[[colors.indexed_colors]]
index = 17
color = "0x650e16"

[[colors.indexed_colors]]
index = 18
color = "0x282f32"

[[colors.indexed_colors]]
index = 19
color = "0x092027"

[[colors.indexed_colors]]
index = 20
color = "0x79817a"

[[colors.indexed_colors]]
index = 21
color = "0xe9e2cd"

