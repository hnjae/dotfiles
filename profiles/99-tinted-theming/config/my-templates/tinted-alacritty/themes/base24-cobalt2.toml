# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Cobalt2 - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x122637'
foreground = '0xa1a1a1'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x122637'
cursor = '0xa1a1a1'

[colors.normal]
black = '0x122637'
red = '0xff0000'
green = '0x37dd21'
yellow = '0x5555ff'
blue = '0x1460d2'
magenta = '0xff005d'
cyan = '0x00bbbb'
white = '0xa1a1a1'

# Bright colors
[colors.bright]
black = '0x6e6e6e'
red = '0xf40d17'
green = '0x3bcf1d'
yellow = '0xecc809'
blue = '0x5555ff'
magenta = '0xff55ff'
cyan = '0x6ae3f9'
white = '0xffffff'

[[colors.indexed_colors]]
index = 16
color = "0xfee409"

[[colors.indexed_colors]]
index = 17
color = "0x7f0000"

[[colors.indexed_colors]]
index = 18
color = "0x000000"

[[colors.indexed_colors]]
index = 19
color = "0x555555"

[[colors.indexed_colors]]
index = 20
color = "0x888888"

[[colors.indexed_colors]]
index = 21
color = "0xbbbbbb"

