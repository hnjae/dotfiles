# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 PaperColor Dark - alacritty color config
# Scheme by Nguyen Nguyen (https://github.com/NLKNguyen/papercolor-theme)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x1c1c1c'
foreground = '0xd0d0d0'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x1c1c1c'
cursor = '0xd0d0d0'

[colors.normal]
black = '0x1c1c1c'
red = '0xaf005f'
green = '0x5faf00'
yellow = '0xd7af5f'
blue = '0x5fafd7'
magenta = '0xaf87d7'
cyan = '0xffaf00'
white = '0xd0d0d0'

# Bright colors
[colors.bright]
black = '0x808080'
red = '0xd7005f'
green = '0xffd75f'
yellow = '0x87d75f'
blue = '0xffd700'
magenta = '0x87d7ff'
cyan = '0x87d700'
white = '0xc6c6c6'

[[colors.indexed_colors]]
index = 16
color = "0x5faf5f"

[[colors.indexed_colors]]
index = 17
color = "0xff5faf"

[[colors.indexed_colors]]
index = 18
color = "0x303030"

[[colors.indexed_colors]]
index = 19
color = "0x3a3a3a"

[[colors.indexed_colors]]
index = 20
color = "0x585858"

[[colors.indexed_colors]]
index = 21
color = "0xbcbcbc"

