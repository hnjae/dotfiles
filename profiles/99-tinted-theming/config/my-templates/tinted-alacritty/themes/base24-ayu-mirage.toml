# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Ayu Mirage - alacritty color config
# Scheme by Tinted Theming (https://github.com/tinted-theming), Ayu Theme (https://github.com/ayu-theme)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x1f2430'
foreground = '0xcccac2'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x1f2430'
cursor = '0xcccac2'

[colors.normal]
black = '0x1f2430'
red = '0xf28779'
green = '0xd5ff80'
yellow = '0xffd173'
blue = '0x73d0ff'
magenta = '0xd4bfff'
cyan = '0x95e6cb'
white = '0xcccac2'

# Bright colors
[colors.bright]
black = '0x4a5059'
red = '0xff6666'
green = '0x87d963'
yellow = '0xffcc66'
blue = '0x80b0ff'
magenta = '0xb692ff'
cyan = '0x5ccfe6'
white = '0xf3f4f5'

[[colors.indexed_colors]]
index = 16
color = "0xffad66"

[[colors.indexed_colors]]
index = 17
color = "0xf27983"

[[colors.indexed_colors]]
index = 18
color = "0x242936"

[[colors.indexed_colors]]
index = 19
color = "0x323844"

[[colors.indexed_colors]]
index = 20
color = "0x707a8c"

[[colors.indexed_colors]]
index = 21
color = "0xd9d7ce"

