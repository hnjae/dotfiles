# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Mona Lisa - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x110b0d'
foreground = '0xdab14e'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x110b0d'
cursor = '0xdab14e'

[colors.normal]
black = '0x110b0d'
red = '0x9b281b'
green = '0x626132'
yellow = '0x9eb2b3'
blue = '0x515b5c'
magenta = '0x9b1d29'
cyan = '0x588056'
white = '0xdab14e'

# Bright colors
[colors.bright]
black = '0xa26734'
red = '0xff4230'
green = '0xb3b163'
yellow = '0xff9565'
blue = '0x9eb2b3'
magenta = '0xff5b6a'
cyan = '0x89cc8e'
white = '0xffe597'

[[colors.indexed_colors]]
index = 16
color = "0xc26e27"

[[colors.indexed_colors]]
index = 17
color = "0x4d140d"

[[colors.indexed_colors]]
index = 18
color = "0x341a0d"

[[colors.indexed_colors]]
index = 19
color = "0x874227"

[[colors.indexed_colors]]
index = 20
color = "0xbe8c41"

[[colors.indexed_colors]]
index = 21
color = "0xf6d75c"

