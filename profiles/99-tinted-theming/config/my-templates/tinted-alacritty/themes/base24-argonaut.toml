# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Argonaut - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x0d0f18'
foreground = '0xd0d0d0'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x0d0f18'
cursor = '0xd0d0d0'

[colors.normal]
black = '0x0d0f18'
red = '0xff000f'
green = '0x8ce00a'
yellow = '0x0092ff'
blue = '0x008df8'
magenta = '0x6c43a5'
cyan = '0x00d7eb'
white = '0xd0d0d0'

# Bright colors
[colors.bright]
black = '0x727272'
red = '0xff273f'
green = '0xabe05a'
yellow = '0xffd141'
blue = '0x0092ff'
magenta = '0x9a5feb'
cyan = '0x67ffef'
white = '0xffffff'

[[colors.indexed_colors]]
index = 16
color = "0xffb900"

[[colors.indexed_colors]]
index = 17
color = "0x7f0007"

[[colors.indexed_colors]]
index = 18
color = "0x222222"

[[colors.indexed_colors]]
index = 19
color = "0x444444"

[[colors.indexed_colors]]
index = 20
color = "0xa1a1a1"

[[colors.indexed_colors]]
index = 21
color = "0xffffff"

