# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Broadcast - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x2b2b2b'
foreground = '0xcbcbcb'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x2b2b2b'
cursor = '0xcbcbcb'

[colors.normal]
black = '0x2b2b2b'
red = '0xda4939'
green = '0x519f50'
yellow = '0x9fcef0'
blue = '0x6d9cbe'
magenta = '0xd0d0ff'
cyan = '0x6e9cbe'
white = '0xcbcbcb'

# Bright colors
[colors.bright]
black = '0x656565'
red = '0xff7b6b'
green = '0x83d182'
yellow = '0xffff7c'
blue = '0x9fcef0'
magenta = '0xffffff'
cyan = '0xa0cef0'
white = '0xffffff'

[[colors.indexed_colors]]
index = 16
color = "0xffd24a"

[[colors.indexed_colors]]
index = 17
color = "0x6d241c"

[[colors.indexed_colors]]
index = 18
color = "0x000000"

[[colors.indexed_colors]]
index = 19
color = "0x323232"

[[colors.indexed_colors]]
index = 20
color = "0x989898"

[[colors.indexed_colors]]
index = 21
color = "0xffffff"

