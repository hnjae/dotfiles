# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 3024 Night - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x090300'
foreground = '0x928f8e'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x090300'
cursor = '0x928f8e'

[colors.normal]
black = '0x090300'
red = '0xdb2d20'
green = '0x01a252'
yellow = '0x807d7c'
blue = '0x01a0e4'
magenta = '0xa16a94'
cyan = '0xb5e4f4'
white = '0x928f8e'

# Bright colors
[colors.bright]
black = '0x6e6a68'
red = '0xe8bbd0'
green = '0x3a3432'
yellow = '0x4a4543'
blue = '0x807d7c'
magenta = '0xd6d5d4'
cyan = '0xcdab53'
white = '0xf7f7f7'

[[colors.indexed_colors]]
index = 16
color = "0xfded02"

[[colors.indexed_colors]]
index = 17
color = "0x6d1610"

[[colors.indexed_colors]]
index = 18
color = "0x090300"

[[colors.indexed_colors]]
index = 19
color = "0x5c5855"

[[colors.indexed_colors]]
index = 20
color = "0x807d7b"

[[colors.indexed_colors]]
index = 21
color = "0xa5a2a2"

