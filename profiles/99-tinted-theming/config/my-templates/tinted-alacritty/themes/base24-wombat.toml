# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Wombat - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x171717'
foreground = '0xb2afa6'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x171717'
cursor = '0xb2afa6'

[colors.normal]
black = '0x171717'
red = '0xff605a'
green = '0xb1e869'
yellow = '0xa5c7ff'
blue = '0x5da9f6'
magenta = '0xe86aff'
cyan = '0x82fff6'
white = '0xb2afa6'

# Bright colors
[colors.bright]
black = '0x5c5b58'
red = '0xf58b7f'
green = '0xdcf88f'
yellow = '0xeee5b2'
blue = '0xa5c7ff'
magenta = '0xddaaff'
cyan = '0xb6fff9'
white = '0xfefffe'

[[colors.indexed_colors]]
index = 16
color = "0xead89c"

[[colors.indexed_colors]]
index = 17
color = "0x7f302d"

[[colors.indexed_colors]]
index = 18
color = "0x000000"

[[colors.indexed_colors]]
index = 19
color = "0x313131"

[[colors.indexed_colors]]
index = 20
color = "0x87857f"

[[colors.indexed_colors]]
index = 21
color = "0xded9ce"

