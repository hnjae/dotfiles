# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Ollie - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x212024'
foreground = '0x7e7789'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x212024'
cursor = '0x7e7789'

[colors.normal]
black = '0x212024'
red = '0xab2e30'
green = '0x31ab60'
yellow = '0x4487ff'
blue = '0x2c56ab'
magenta = '0xaf8427'
cyan = '0x1fa5ab'
white = '0x7e7789'

# Bright colors
[colors.bright]
black = '0x664b46'
red = '0xff3d48'
green = '0x3bff99'
yellow = '0xff5e1e'
blue = '0x4487ff'
magenta = '0xffc21c'
cyan = '0x1efaff'
white = '0x5b6da7'

[[colors.indexed_colors]]
index = 16
color = "0xab4200"

[[colors.indexed_colors]]
index = 17
color = "0x551718"

[[colors.indexed_colors]]
index = 18
color = "0x000000"

[[colors.indexed_colors]]
index = 19
color = "0x5a3625"

[[colors.indexed_colors]]
index = 20
color = "0x726168"

[[colors.indexed_colors]]
index = 21
color = "0x8a8dab"

