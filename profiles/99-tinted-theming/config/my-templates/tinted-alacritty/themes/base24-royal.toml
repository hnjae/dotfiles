# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Royal - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x100814'
foreground = '0x49425a'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x100814'
cursor = '0x49425a'

[colors.normal]
black = '0x100814'
red = '0x90274b'
green = '0x23801c'
yellow = '0x8fb9f9'
blue = '0x6480af'
magenta = '0x664d96'
cyan = '0x8aaabd'
white = '0x49425a'

# Bright colors
[colors.bright]
black = '0x393446'
red = '0xd4346c'
green = '0x2cd845'
yellow = '0xfde83a'
blue = '0x8fb9f9'
magenta = '0xa479e2'
cyan = '0xabd3eb'
white = '0x9d8bbd'

[[colors.indexed_colors]]
index = 16
color = "0xb49d27"

[[colors.indexed_colors]]
index = 17
color = "0x481325"

[[colors.indexed_colors]]
index = 18
color = "0x241f2a"

[[colors.indexed_colors]]
index = 19
color = "0x312d3c"

[[colors.indexed_colors]]
index = 20
color = "0x413b50"

[[colors.indexed_colors]]
index = 21
color = "0x514965"

