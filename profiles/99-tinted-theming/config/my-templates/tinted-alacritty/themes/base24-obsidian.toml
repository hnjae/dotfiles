# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Obsidian - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x273032'
foreground = '0xa1a1a1'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x273032'
cursor = '0xa1a1a1'

[colors.normal]
black = '0x273032'
red = '0xa50001'
green = '0x00bb00'
yellow = '0xa0d6ff'
blue = '0x399bda'
magenta = '0xbb00bb'
cyan = '0x00bbbb'
white = '0xa1a1a1'

# Bright colors
[colors.bright]
black = '0x6e6e6e'
red = '0xff0003'
green = '0x92c763'
yellow = '0xfef773'
blue = '0xa0d6ff'
magenta = '0xff55ff'
cyan = '0x55ffff'
white = '0xffffff'

[[colors.indexed_colors]]
index = 16
color = "0xfecc22"

[[colors.indexed_colors]]
index = 17
color = "0x520000"

[[colors.indexed_colors]]
index = 18
color = "0x000000"

[[colors.indexed_colors]]
index = 19
color = "0x555555"

[[colors.indexed_colors]]
index = 20
color = "0x888888"

[[colors.indexed_colors]]
index = 21
color = "0xbbbbbb"

