# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Sparky - alacritty color config
# Scheme by Leila Sother (https://github.com/mixcoac)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x072b31'
foreground = '0xf4f5f0'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x072b31'
cursor = '0xf4f5f0'

[colors.normal]
black = '0x072b31'
red = '0xff585d'
green = '0x78d64b'
yellow = '0xfbdd40'
blue = '0x4698cb'
magenta = '0xd59ed7'
cyan = '0x2dccd3'
white = '0xf4f5f0'

# Bright colors
[colors.bright]
black = '0x003b49'
red = '0xff7276'
green = '0x8edd65'
yellow = '0xf6eb61'
blue = '0x69b3e7'
magenta = '0xf99fc9'
cyan = '0x00c1d5'
white = '0xffffff'

[[colors.indexed_colors]]
index = 16
color = "0xff8f1c"

[[colors.indexed_colors]]
index = 17
color = "0x9b704d"

[[colors.indexed_colors]]
index = 18
color = "0x00313c"

[[colors.indexed_colors]]
index = 19
color = "0x003c46"

[[colors.indexed_colors]]
index = 20
color = "0x00778b"

[[colors.indexed_colors]]
index = 21
color = "0xf5f5f1"

# vi:ft=toml
