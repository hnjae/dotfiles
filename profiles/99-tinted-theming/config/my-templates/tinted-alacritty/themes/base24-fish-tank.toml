# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Fish Tank - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x222436'
foreground = '0xccc9c9'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x222436'
cursor = '0xccc9c9'

[colors.normal]
black = '0x222436'
red = '0xc60049'
green = '0xabf157'
yellow = '0xb1bdf9'
blue = '0x525fb8'
magenta = '0x976f81'
cyan = '0x968662'
white = '0xccc9c9'

# Bright colors
[colors.bright]
black = '0x8c7f63'
red = '0xd94a8a'
green = '0xdaffa8'
yellow = '0xfee6a8'
blue = '0xb1bdf9'
magenta = '0xfda4cc'
cyan = '0xa4bc86'
white = '0xf6ffec'

[[colors.indexed_colors]]
index = 16
color = "0xfdcd5e"

[[colors.indexed_colors]]
index = 17
color = "0x630024"

[[colors.indexed_colors]]
index = 18
color = "0x03063c"

[[colors.indexed_colors]]
index = 19
color = "0x6c5a30"

[[colors.indexed_colors]]
index = 20
color = "0xaca496"

[[colors.indexed_colors]]
index = 21
color = "0xeceffc"

