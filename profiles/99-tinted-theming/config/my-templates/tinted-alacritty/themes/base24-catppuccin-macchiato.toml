# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Catppuccin Macchiato - alacritty color config
# Scheme by https://github.com/catppuccin/catppuccin

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x24273a'
foreground = '0xcad3f5'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x24273a'
cursor = '0xcad3f5'

[colors.normal]
black = '0x24273a'
red = '0xed8796'
green = '0xa6da95'
yellow = '0xeed49f'
blue = '0x8aadf4'
magenta = '0xc6a0f6'
cyan = '0x8bd5ca'
white = '0xcad3f5'

# Bright colors
[colors.bright]
black = '0x494d64'
red = '0xee99a0'
green = '0xa6da95'
yellow = '0xf4dbd6'
blue = '0x7dc4e4'
magenta = '0xf5bde6'
cyan = '0x91d7e3'
white = '0xb7bdf8'

[[colors.indexed_colors]]
index = 16
color = "0xf5a97f"

[[colors.indexed_colors]]
index = 17
color = "0xf0c6c6"

[[colors.indexed_colors]]
index = 18
color = "0x1e2030"

[[colors.indexed_colors]]
index = 19
color = "0x363a4f"

[[colors.indexed_colors]]
index = 20
color = "0x5b6078"

[[colors.indexed_colors]]
index = 21
color = "0xf4dbd6"

