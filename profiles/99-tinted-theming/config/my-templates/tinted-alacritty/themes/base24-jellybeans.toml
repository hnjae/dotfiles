# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Jellybeans - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x121212'
foreground = '0xd5d5d5'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x121212'
cursor = '0xd5d5d5'

[colors.normal]
black = '0x121212'
red = '0xe27373'
green = '0x93b979'
yellow = '0xb1d8f6'
blue = '0x97bedc'
magenta = '0xe1c0fa'
cyan = '0x00988e'
white = '0xd5d5d5'

# Bright colors
[colors.bright]
black = '0xc5c5c5'
red = '0xffa1a1'
green = '0xbddeab'
yellow = '0xffdca0'
blue = '0xb1d8f6'
magenta = '0xfbdaff'
cyan = '0x1ab2a8'
white = '0xffffff'

[[colors.indexed_colors]]
index = 16
color = "0xffba7b"

[[colors.indexed_colors]]
index = 17
color = "0x713939"

[[colors.indexed_colors]]
index = 18
color = "0x929292"

[[colors.indexed_colors]]
index = 19
color = "0xbdbdbd"

[[colors.indexed_colors]]
index = 20
color = "0xcdcdcd"

[[colors.indexed_colors]]
index = 21
color = "0xdedede"

