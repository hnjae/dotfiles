# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 One Light - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0xe7e7e9'
foreground = '0x383a42'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0xe7e7e9'
cursor = '0x383a42'

[colors.normal]
black = '0xe7e7e9'
red = '0xca1243'
green = '0x50a14f'
yellow = '0xfebb2a'
blue = '0x4078f2'
magenta = '0xa626a4'
cyan = '0x0184bc'
white = '0x383a42'

# Bright colors
[colors.bright]
black = '0xa0a1a7'
red = '0xec2258'
green = '0x6db76c'
yellow = '0xf4a701'
blue = '0x709af5'
magenta = '0xd02fcd'
cyan = '0x01a7ef'
white = '0x090a0b'

[[colors.indexed_colors]]
index = 16
color = "0xc18401"

[[colors.indexed_colors]]
index = 17
color = "0x986801"

[[colors.indexed_colors]]
index = 18
color = "0xdfdfe1"

[[colors.indexed_colors]]
index = 19
color = "0xcacace"

[[colors.indexed_colors]]
index = 20
color = "0x696c77"

[[colors.indexed_colors]]
index = 21
color = "0x202227"

