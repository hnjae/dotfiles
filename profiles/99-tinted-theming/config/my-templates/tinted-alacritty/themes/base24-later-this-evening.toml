# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Later This Evening - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x212121'
foreground = '0xa6a6a6'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x212121'
cursor = '0xa6a6a6'

[colors.normal]
black = '0x212121'
red = '0xd35a5f'
green = '0xafba66'
yellow = '0xe5d289'
blue = '0xa0b9d5'
magenta = '0xbf92d5'
cyan = '0x91beb6'
white = '0xa6a6a6'

# Bright colors
[colors.bright]
black = '0x6f6f6f'
red = '0xd3222e'
green = '0xaabb39'
yellow = '0xe4bd39'
blue = '0x6599d5'
magenta = '0xaa52d5'
cyan = '0x5fbfad'
white = '0xd9d9d9'

[[colors.indexed_colors]]
index = 16
color = "0xe5af89"

[[colors.indexed_colors]]
index = 17
color = "0x692d2f"

[[colors.indexed_colors]]
index = 18
color = "0x313131"

[[colors.indexed_colors]]
index = 19
color = "0x4f4f4f"

[[colors.indexed_colors]]
index = 20
color = "0x8c8c8c"

[[colors.indexed_colors]]
index = 21
color = "0xbfbfbf"

