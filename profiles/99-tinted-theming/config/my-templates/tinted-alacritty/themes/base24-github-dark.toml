# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Github Dark - alacritty color config
# Scheme by Tinted Theming (https://github.com/tinted-theming)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x161b22'
foreground = '0xc9d1d9'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x161b22'
cursor = '0xc9d1d9'

[colors.normal]
black = '0x161b22'
red = '0xf85149'
green = '0x2ea043'
yellow = '0xbb8009'
blue = '0x388bfd'
magenta = '0xa371f7'
cyan = '0x2a9d9a'
white = '0xc9d1d9'

# Bright colors
[colors.bright]
black = '0x6e7681'
red = '0xff7b72'
green = '0x3fb950'
yellow = '0xd29922'
blue = '0x58a6ff'
magenta = '0xbc8cff'
cyan = '0x33b3ae'
white = '0xffffff'

[[colors.indexed_colors]]
index = 16
color = "0xdb6d28"

[[colors.indexed_colors]]
index = 17
color = "0x3d2f00"

[[colors.indexed_colors]]
index = 18
color = "0x30363d"

[[colors.indexed_colors]]
index = 19
color = "0x484f58"

[[colors.indexed_colors]]
index = 20
color = "0x8b949e"

[[colors.indexed_colors]]
index = 21
color = "0xf0f6fc"

