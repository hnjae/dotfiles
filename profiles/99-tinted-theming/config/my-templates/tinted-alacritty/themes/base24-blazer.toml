# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Blazer - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x0d1926'
foreground = '0xacacac'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x0d1926'
cursor = '0xacacac'

[colors.normal]
black = '0x0d1926'
red = '0xb87a7a'
green = '0x7ab87a'
yellow = '0xbdbddb'
blue = '0x7a7ab8'
magenta = '0xb87ab8'
cyan = '0x7ab8b8'
white = '0xacacac'

# Bright colors
[colors.bright]
black = '0x525252'
red = '0xdbbdbd'
green = '0xbddbbd'
yellow = '0xdbdbbd'
blue = '0xbdbddb'
magenta = '0xdbbddb'
cyan = '0xbddbdb'
white = '0xffffff'

[[colors.indexed_colors]]
index = 16
color = "0xb8b87a"

[[colors.indexed_colors]]
index = 17
color = "0x5c3d3d"

[[colors.indexed_colors]]
index = 18
color = "0x000000"

[[colors.indexed_colors]]
index = 19
color = "0x262626"

[[colors.indexed_colors]]
index = 20
color = "0x7f7f7f"

[[colors.indexed_colors]]
index = 21
color = "0xd9d9d9"

# vi:ft=toml
