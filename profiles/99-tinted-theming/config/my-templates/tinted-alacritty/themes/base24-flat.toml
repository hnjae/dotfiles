# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Flat - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x082845'
foreground = '0x8c939a'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x082845'
cursor = '0x8c939a'

[colors.normal]
black = '0x082845'
red = '0xa82320'
green = '0x2d9440'
yellow = '0x3c7dd2'
blue = '0x3167ac'
magenta = '0x781aa0'
cyan = '0x2c9370'
white = '0x8c939a'

# Bright colors
[colors.bright]
black = '0x444e5b'
red = '0xd4312e'
green = '0x32a548'
yellow = '0xe5be0c'
blue = '0x3c7dd2'
magenta = '0x8230a7'
cyan = '0x35b387'
white = '0xe7eced'

[[colors.indexed_colors]]
index = 16
color = "0xe58d11"

[[colors.indexed_colors]]
index = 17
color = "0x541110"

[[colors.indexed_colors]]
index = 18
color = "0x1d2845"

[[colors.indexed_colors]]
index = 19
color = "0x2e2e45"

[[colors.indexed_colors]]
index = 20
color = "0x68717b"

[[colors.indexed_colors]]
index = 21
color = "0xb0b6ba"

