# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Wild Cherry - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x1f1626'
foreground = '0xbfe1d8'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x1f1626'
cursor = '0xbfe1d8'

[colors.normal]
black = '0x1f1626'
red = '0xd94085'
green = '0x2ab250'
yellow = '0x2f8bb9'
blue = '0x883cdc'
magenta = '0xececec'
cyan = '0xc1b8b7'
white = '0xbfe1d8'

# Bright colors
[colors.bright]
black = '0x3fb3ce'
red = '0xda6bab'
green = '0xf4dba5'
yellow = '0xeac066'
blue = '0x2f8bb9'
magenta = '0xae636b'
cyan = '0xff919d'
white = '0xe4838d'

[[colors.indexed_colors]]
index = 16
color = "0xffd16f"

[[colors.indexed_colors]]
index = 17
color = "0x6c2042"

[[colors.indexed_colors]]
index = 18
color = "0x000506"

[[colors.indexed_colors]]
index = 19
color = "0x009cc9"

[[colors.indexed_colors]]
index = 20
color = "0x7fcad3"

[[colors.indexed_colors]]
index = 21
color = "0xfff8dd"

