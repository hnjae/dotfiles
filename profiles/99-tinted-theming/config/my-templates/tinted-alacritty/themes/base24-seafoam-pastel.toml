# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Seafoam Pastel - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x243434'
foreground = '0xcacaca'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x243434'
cursor = '0xcacaca'

[colors.normal]
black = '0x243434'
red = '0x825d4d'
green = '0x718c61'
yellow = '0x79c3cf'
blue = '0x4d7b82'
magenta = '0x8a7167'
cyan = '0x719393'
white = '0xcacaca'

# Bright colors
[colors.bright]
black = '0x9f9f9f'
red = '0xcf9379'
green = '0x98d9aa'
yellow = '0xfae79d'
blue = '0x79c3cf'
magenta = '0xd6b2a1'
cyan = '0xade0e0'
white = '0xe0e0e0'

[[colors.indexed_colors]]
index = 16
color = "0xada16d"

[[colors.indexed_colors]]
index = 17
color = "0x412e26"

[[colors.indexed_colors]]
index = 18
color = "0x757575"

[[colors.indexed_colors]]
index = 19
color = "0x8a8a8a"

[[colors.indexed_colors]]
index = 20
color = "0xb5b5b5"

[[colors.indexed_colors]]
index = 21
color = "0xe0e0e0"

