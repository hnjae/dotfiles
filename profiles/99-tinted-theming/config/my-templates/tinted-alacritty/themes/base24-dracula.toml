# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Dracula - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x282a36'
foreground = '0xf8f8f2'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x282a36'
cursor = '0xf8f8f2'

[colors.normal]
black = '0x282a36'
red = '0xff5555'
green = '0x50fa7b'
yellow = '0xf1fa8c'
blue = '0x80bfff'
magenta = '0xff79c6'
cyan = '0x8be9fd'
white = '0xf8f8f2'

# Bright colors
[colors.bright]
black = '0x6272a4'
red = '0xf28c8c'
green = '0xa3f5b8'
yellow = '0xeef5a3'
blue = '0xa3ccf5'
magenta = '0xf5a3d2'
cyan = '0xbaedf7'
white = '0xffffff'

[[colors.indexed_colors]]
index = 16
color = "0xffb86c"

[[colors.indexed_colors]]
index = 17
color = "0xbd93f9"

[[colors.indexed_colors]]
index = 18
color = "0x363447"

[[colors.indexed_colors]]
index = 19
color = "0x44475a"

[[colors.indexed_colors]]
index = 20
color = "0x9ea8c7"

[[colors.indexed_colors]]
index = 21
color = "0xf0f1f4"

