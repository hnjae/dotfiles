# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Fun Forrest - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x241200'
foreground = '0xc5ab60'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x241200'
cursor = '0xc5ab60'

[colors.normal]
black = '0x241200'
red = '0xd5252b'
green = '0x909b00'
yellow = '0x7cc9ce'
blue = '0x4698a2'
magenta = '0x8c4231'
cyan = '0xd98112'
white = '0xc5ab60'

# Bright colors
[colors.bright]
black = '0x957f58'
red = '0xe4591b'
green = '0xbfc659'
yellow = '0xffca1b'
blue = '0x7cc9ce'
magenta = '0xd16349'
cyan = '0xe6a96b'
white = '0xffe9a3'

[[colors.indexed_colors]]
index = 16
color = "0xbd8a13"

[[colors.indexed_colors]]
index = 17
color = "0x6a1215"

[[colors.indexed_colors]]
index = 18
color = "0x000000"

[[colors.indexed_colors]]
index = 19
color = "0x7e6954"

[[colors.indexed_colors]]
index = 20
color = "0xad955c"

[[colors.indexed_colors]]
index = 21
color = "0xddc165"

