# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Treehouse - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x191919'
foreground = '0x695d47'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x191919'
cursor = '0x695d47'

[colors.normal]
black = '0x191919'
red = '0xb1270e'
green = '0x44a900'
yellow = '0x85cfec'
blue = '0x578499'
magenta = '0x96363c'
cyan = '0xb2591d'
white = '0x695d47'

# Bright colors
[colors.bright]
black = '0x4f4330'
red = '0xed5c20'
green = '0x55f237'
yellow = '0xf1b731'
blue = '0x85cfec'
magenta = '0xe04b5a'
cyan = '0xf07d14'
white = '0xffc800'

[[colors.indexed_colors]]
index = 16
color = "0xa9810b"

[[colors.indexed_colors]]
index = 17
color = "0x581307"

[[colors.indexed_colors]]
index = 18
color = "0x321200"

[[colors.indexed_colors]]
index = 19
color = "0x423625"

[[colors.indexed_colors]]
index = 20
color = "0x5c503c"

[[colors.indexed_colors]]
index = 21
color = "0x776b53"

