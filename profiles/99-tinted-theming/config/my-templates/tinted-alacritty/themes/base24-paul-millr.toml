# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Paul Millr - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x000000'
foreground = '0xa5a5a5'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x000000'
cursor = '0xa5a5a5'

[colors.normal]
black = '0x000000'
red = '0xff0000'
green = '0x79ff0f'
yellow = '0x709aed'
blue = '0x386bd7'
magenta = '0xb349be'
cyan = '0x66ccff'
white = '0xa5a5a5'

# Bright colors
[colors.bright]
black = '0x7b7b7b'
red = '0xff0080'
green = '0x66ff66'
yellow = '0xf3d64e'
blue = '0x709aed'
magenta = '0xdb67e6'
cyan = '0x79dff2'
white = '0xffffff'

[[colors.indexed_colors]]
index = 16
color = "0xe7bf00"

[[colors.indexed_colors]]
index = 17
color = "0x7f0000"

[[colors.indexed_colors]]
index = 18
color = "0x2a2a2a"

[[colors.indexed_colors]]
index = 19
color = "0x666666"

[[colors.indexed_colors]]
index = 20
color = "0x909090"

[[colors.indexed_colors]]
index = 21
color = "0xbbbbbb"

