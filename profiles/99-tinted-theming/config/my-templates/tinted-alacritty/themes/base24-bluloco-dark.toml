# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Bluloco Dark - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x1e2027'
foreground = '0xb1bac9'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x1e2027'
cursor = '0xb1bac9'

[colors.normal]
black = '0x1e2027'
red = '0xf71041'
green = '0x23974a'
yellow = '0x189ffd'
blue = '0x285afe'
magenta = '0x8c62fd'
cyan = '0x366f99'
white = '0xb1bac9'

# Bright colors
[colors.bright]
black = '0x7b8494'
red = '0xfb496d'
green = '0x37bc58'
yellow = '0xf6bd47'
blue = '0x189ffd'
magenta = '0xfb57f6'
cyan = '0x4fabad'
white = '0xfefefe'

[[colors.indexed_colors]]
index = 16
color = "0xfc7e57"

[[colors.indexed_colors]]
index = 17
color = "0x7b0820"

[[colors.indexed_colors]]
index = 18
color = "0x494f5c"

[[colors.indexed_colors]]
index = 19
color = "0x60697a"

[[colors.indexed_colors]]
index = 20
color = "0x969faf"

[[colors.indexed_colors]]
index = 21
color = "0xccd5e4"

