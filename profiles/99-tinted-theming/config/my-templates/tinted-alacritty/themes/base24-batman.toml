# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Batman - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x1b1d1e'
foreground = '0xa7a8a3'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x1b1d1e'
cursor = '0xa7a8a3'

[colors.normal]
black = '0x1b1d1e'
red = '0xe6db43'
green = '0xc8be46'
yellow = '0x909495'
blue = '0x737074'
magenta = '0x737271'
cyan = '0x615f5e'
white = '0xa7a8a3'

# Bright colors
[colors.bright]
black = '0x6d6f6e'
red = '0xfff68d'
green = '0xfff27c'
yellow = '0xfeed6c'
blue = '0x909495'
magenta = '0x9a999d'
cyan = '0xa2a2a5'
white = '0xdadad5'

[[colors.indexed_colors]]
index = 16
color = "0xf3fd21"

[[colors.indexed_colors]]
index = 17
color = "0x736d21"

[[colors.indexed_colors]]
index = 18
color = "0x1b1d1e"

[[colors.indexed_colors]]
index = 19
color = "0x505354"

[[colors.indexed_colors]]
index = 20
color = "0x8a8c89"

[[colors.indexed_colors]]
index = 21
color = "0xc5c5be"

