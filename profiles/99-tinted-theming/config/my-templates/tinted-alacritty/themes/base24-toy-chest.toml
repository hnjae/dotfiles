# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Toy Chest - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x23364a'
foreground = '0x27b684'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x23364a'
cursor = '0x27b684'

[colors.normal]
black = '0x23364a'
red = '0xbe2d26'
green = '0x199171'
yellow = '0x33a5d9'
blue = '0x325d96'
magenta = '0x8a5ddb'
cyan = '0x35a08f'
white = '0x27b684'

# Bright colors
[colors.bright]
black = '0x2f8288'
red = '0xdd5943'
green = '0x30cf7b'
yellow = '0xe7d74b'
blue = '0x33a5d9'
magenta = '0xad6bdc'
cyan = '0x41c3ad'
white = '0xd4d4d4'

[[colors.indexed_colors]]
index = 16
color = "0xda8e26"

[[colors.indexed_colors]]
index = 17
color = "0x5f1613"

[[colors.indexed_colors]]
index = 18
color = "0x2c3f57"

[[colors.indexed_colors]]
index = 19
color = "0x326889"

[[colors.indexed_colors]]
index = 20
color = "0x2b9c86"

[[colors.indexed_colors]]
index = 21
color = "0x23d082"

