# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Spacedust - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x0a1e24'
foreground = '0xcdc7a6'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x0a1e24'
cursor = '0xcdc7a6'

[colors.normal]
black = '0x0a1e24'
red = '0xe35a00'
green = '0x5cab96'
yellow = '0x67a0cd'
blue = '0x0e548b'
magenta = '0xe35a00'
cyan = '0x06afc7'
white = '0xcdc7a6'

# Bright colors
[colors.bright]
black = '0x897558'
red = '0xff8a39'
green = '0xadcab8'
yellow = '0xffc777'
blue = '0x67a0cd'
magenta = '0xff8a39'
cyan = '0x83a6b3'
white = '0xfefff0'

[[colors.indexed_colors]]
index = 16
color = "0xe3cd7b"

[[colors.indexed_colors]]
index = 17
color = "0x712d00"

[[colors.indexed_colors]]
index = 18
color = "0x6e5246"

[[colors.indexed_colors]]
index = 19
color = "0x674c31"

[[colors.indexed_colors]]
index = 20
color = "0xab9e7f"

[[colors.indexed_colors]]
index = 21
color = "0xf0f1ce"

