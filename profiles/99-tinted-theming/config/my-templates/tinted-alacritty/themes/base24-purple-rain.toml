# NOTE:
#   - following version 0.1.3 of base24 <2026-03-15>
#   - <https://github.com/tinted-theming/base24/blob/main/styling.md>
#
# Base24 Purple Rain - alacritty color config
# Scheme by FredHappyface (https://github.com/fredHappyface)

# COLORFGBG = if (config.base-home.base24.variant == "light") then "0;15" else "15;0";
# [env]
# COLORFGBG = "${COLORFGBG}"

[colors]
draw_bold_text_with_bright_colors = false

# Default colors
[colors.primary]
background = '0x20084a'
foreground = '0xd3d4d4'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x20084a'
cursor = '0xd3d4d4'

[colors.normal]
black = '0x20084a'
red = '0xff260d'
green = '0x9ae204'
yellow = '0x00a5ff'
blue = '0x00a1f9'
magenta = '0x805bb5'
cyan = '0x00ddef'
white = '0xd3d4d4'

# Bright colors
[colors.bright]
black = '0x7f7f7f'
red = '0xff4250'
green = '0xb8e36d'
yellow = '0xffd852'
blue = '0x00a5ff'
magenta = '0xab7aef'
cyan = '0x74fcf3'
white = '0xfeffff'

[[colors.indexed_colors]]
index = 16
color = "0xffc400"

[[colors.indexed_colors]]
index = 17
color = "0x7f1306"

[[colors.indexed_colors]]
index = 18
color = "0x000000"

[[colors.indexed_colors]]
index = 19
color = "0x555555"

[[colors.indexed_colors]]
index = 20
color = "0xa9aaaa"

[[colors.indexed_colors]]
index = 21
color = "0xfeffff"

