# [keyboard]
# bindings = [{ <key>, <mods>, <mode>, <command> | <chars> | <action> },]
#
#   # command + t                      C-q c
#   - { key: T, mods: Command, chars: "\x11c" } # tmux 새로운 window 생성


[keyboard]
bindings = [
  { key = "-", mods = "Control|Shift", action = "DecreaseFontSize" },
  { key = "+", mods = "Control|Shift", action = "IncreaseFontSize" },
  { key = "_", mods = "Control|Shift", action = "DecreaseFontSize" },

  ##############################################################################
  # Tmux
  ##############################################################################
  # alt-e: \u001be

  # split
  { chars = "\u001be\u0025", key = "o", mods = "Control|Shift" },
  { chars = "\u001be\u0022", key = "e", mods = "Control|Shift" },

  { chars = "\u001be\u001b\u005b\u0044", key = "LBracket", mods = "Control|Shift" },
  { chars = "\u001beo", key = "RBracket", mods = "Control|Shift" },
  { chars = "\u001be\u001b\u005b\u0041", key = "Up", mods = "Control|Alt" },
  { chars = "\u001be\u001b\u005b\u0042", key = "Down", mods = "Control|Alt" },
  { chars = "\u001be\u001b\u005b\u0043", key = "Right", mods = "Control|Alt" },
  { chars = "\u001be\u001b\u005b\u0044", key = "Left", mods = "Control|Alt" },

  { chars = "\u001bez", key = "Enter", mods = "Control|Shift" },

  # tab-create
  { chars = "\u001bec", key = "t", mods = "Control|Shift" },

  # tab-switch
  { chars = "\u001ben", key = "Tab", mods = "Control" },
  { chars = "\u001bep", key = "Tab", mods = "Control|Shift" },
  { chars = "\u001ben", key = "PageDown", mods = "Control" },
  { chars = "\u001bep", key = "PageUp", mods = "Control" },
  { chars = "\u001ben", key = "Left", mods = "Control|Shift" },
  { chars = "\u001bep", key = "Right", mods = "Control|Shift" },
  { chars = "\u001be0", key = "0", mods = "Alt" },
  { chars = "\u001be1", key = "1", mods = "Alt" },
  { chars = "\u001be2", key = "2", mods = "Alt" },
  { chars = "\u001be3", key = "3", mods = "Alt" },
  { chars = "\u001be4", key = "4", mods = "Alt" },
  { chars = "\u001be5", key = "5", mods = "Alt" },
  { chars = "\u001be6", key = "6", mods = "Alt" },
  { chars = "\u001be7", key = "7", mods = "Alt" },
  { chars = "\u001be8", key = "8", mods = "Alt" },
]
