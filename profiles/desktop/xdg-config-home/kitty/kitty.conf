# Basic kitty configuration

# Terminal
# term xterm-kitty
shell /usr/bin/env zsh

# Fonts
font_family      Sarasa Fixed K Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0
disable_ligatures always

# Window
remember_window_size  yes
initial_window_width  100c
initial_window_height 32c
window_padding_width  6
hide_window_decorations no
inactive_text_alpha   1.0
enabled_layouts       splits,stack,tall

# Scrolling
scrollback_lines 10000
wheel_scroll_multiplier 3.0

# Cursor
cursor_shape block
cursor_blink_interval 0

# Shell integration
shell_integration disabled

# Style
include themes/gruvbox-light-tuned.conf

# Environment
env BAT_THEME=base16-256
env BAT_THEME_LIGHT=gruvbox-light
env BAT_THEME_DARK=gruvbox-dark

# Clipboard and selection
# select -> primary
copy_on_select on
strip_trailing_spaces smart

# URLs
detect_urls yes
url_style curly
open_url_with default

# Tabs
tab_bar_edge top
# tab_bar.py fixes tab bodies at 24 cells and lets kitty shrink them when crowded.
tab_bar_style custom
tab_separator "  |  "
tab_title_template "{index}: {fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{tab.last_focused_progress_percent}{title}"
# tab 간 margin 이 아님 window 경계와 접한 tab의 padding 이라 생각할 것.
tab_bar_margin_width 1
active_tab_font_style bold
inactive_tab_font_style normal

# Behavior
enable_audio_bell no
confirm_os_window_close 0

# Key bindings

# Free ctrl+shift+p from kitty's default multi-key hint shortcuts.
map kitty_mod+p>f
map kitty_mod+p>shift+f
map kitty_mod+p>c
map kitty_mod+p>d
map kitty_mod+p>l
map kitty_mod+p>w
map kitty_mod+p>h
map kitty_mod+p>n
map kitty_mod+p>y
map ctrl+shift+p command_palette

# Disable context-switching shortcuts.
map ctrl+shift+n no_op
map ctrl+enter no_op
map ctrl+plus no_op
map ctrl+minus no_op

# Font size, matching the Ghostty step size.
map ctrl+shift+plus  change_font_size all +0.5
map ctrl+shift+equal change_font_size all +0.5
map ctrl+shift+minus change_font_size all -0.5

# Split/window creation and layout.
map ctrl+shift+o launch --location=vsplit --cwd=current
map ctrl+shift+e launch --location=hsplit --cwd=current
map ctrl+shift+w         close_window

# Split/window navigation.
map alt+h     previous_window
map alt+l     next_window
map alt+j     neighboring_window down
map alt+k     neighboring_window up
map alt+left  neighboring_window left
map alt+down  neighboring_window down
map alt+up    neighboring_window up
map alt+right neighboring_window right

map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window down
map ctrl+shift+k neighboring_window up
map ctrl+shift+l neighboring_window right

# Tab movement.
map ctrl+shift+page_up   move_tab_backward
map ctrl+shift+page_down move_tab_forward

# Clipboard behavior.
map shift+delete copy_to_clipboard
map shift+insert paste_from_clipboard
map ctrl+c       copy_or_interrupt

# Claude Code newline insert.
map shift+enter send_text all \x1b\r
