[[mgr.prepend_keymap]]
on = ["d"]
run = "create --dir"
desc = "Create a directory"

[[mgr.prepend_keymap]]
on = ["%"]
run = "plugin my-file-create"
desc = "Create a file"

[[mgr.prepend_keymap]]
on = ["D"]
run = "remove"
desc = "Trash selected files"

[[mgr.prepend_keymap]]
on = ["x"]
run = "plugin my-open-associated"
desc = "Open hovered entry with associated program"

[[mgr.prepend_keymap]]
on = ["p"]
run = "spot"
desc = "Spot hovered file"

[[mgr.prepend_keymap]]
on = ["P"]
run = "spot"
desc = "Spot hovered file"

[[mgr.prepend_keymap]]
on = ["m", "c"]
run = "yank"
desc = "Yank selected files (copy)"

[[mgr.prepend_keymap]]
on = ["m", "m"]
run = "yank --cut"
desc = "Yank selected files (cut)"

[[mgr.prepend_keymap]]
on = ["m", "p"]
run = "paste"
desc = "Paste yanked files"

[[mgr.prepend_keymap]]
on = ["m", "P"]
run = "paste --force"
desc = "Paste yanked files (overwrite if the destination exists)"

[[mgr.prepend_keymap]]
on = ["m", "u"]
run = "unyank"
desc = "Cancel the yank status"

[[mgr.prepend_keymap]]
on = ["i", "s"]
run = "linemode size"
desc = "Linemode: size"

[[mgr.prepend_keymap]]
on = ["i", "i"]
run = "linemode none"
desc = "Reset linemode"

[[mgr.prepend_keymap]]
on = ["i", "p"]
run = "linemode permissions"
desc = "Linemode: permissions"

[[mgr.prepend_keymap]]
on = ["i", "b"]
run = "linemode btime"
desc = "Linemode: btime"

[[mgr.prepend_keymap]]
on = ["i", "m"]
run = "linemode mtime"
desc = "Linemode: mtime"

[[mgr.prepend_keymap]]
on = ["i", "o"]
run = "linemode owner"
desc = "Linemode: owner"

[[mgr.prepend_keymap]]
on = ["i", "n"]
run = "linemode none"
desc = "Linemode: none"

[[mgr.prepend_keymap]]
on = ["c", "("]
run = "plugin my-copy-bracket-content round"
desc = "Copy () content from filename"

[[mgr.prepend_keymap]]
on = ["c", "["]
run = "plugin my-copy-bracket-content square"
desc = "Copy [] content from filename"

[[mgr.prepend_keymap]]
on = ["c", "p"]
run = "copy path"
desc = "Copy the file path"

[[mgr.prepend_keymap]]
on = ["c", "c"]
run = "noop"

[[mgr.prepend_keymap]]
on = ["m", "s"]
run = "noop"

[[mgr.prepend_keymap]]
on = ["m", "b"]
run = "noop"

[[mgr.prepend_keymap]]
on = ["m", "o"]
run = "noop"

[[mgr.prepend_keymap]]
on = ["m", "n"]
run = "noop"

[[mgr.prepend_keymap]]
on = ["1"]
run = "plugin relative-motions 1"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = ["2"]
run = "plugin relative-motions 2"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = ["3"]
run = "plugin relative-motions 3"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = ["4"]
run = "plugin relative-motions 4"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = ["5"]
run = "plugin relative-motions 5"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = ["6"]
run = "plugin relative-motions 6"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = ["7"]
run = "plugin relative-motions 7"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = ["8"]
run = "plugin relative-motions 8"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = ["9"]
run = "plugin relative-motions 9"
desc = "Move in relative steps"
