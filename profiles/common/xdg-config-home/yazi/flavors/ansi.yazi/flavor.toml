# ANSI Color Scheme Flavor for Yazi
# Uses only Yazi's named terminal colors; no hex colors are hard-coded.

[mgr]
cwd = { fg = "lightcyan", bold = true }

find_keyword = { fg = "black", bg = "lightyellow", bold = true }
find_position = { fg = "lightmagenta", bold = true }

marker_copied = { fg = "green", bg = "green" }
marker_cut = { fg = "red", bg = "red" }
marker_marked = { fg = "cyan", bg = "cyan" }
marker_selected = { fg = "yellow", bg = "yellow" }

count_copied = { fg = "black", bg = "lightgreen", bold = true }
count_cut = { fg = "black", bg = "lightred", bold = true }
count_selected = { fg = "black", bg = "lightyellow", bold = true }

border_symbol = "│"
border_style = { fg = "darkgray" }

[tabs]
active = { fg = "black", bg = "lightcyan", bold = true }
inactive = { fg = "gray" }

[mode]
normal_main = { fg = "black", bg = "lightblue", bold = true }
normal_alt = { fg = "lightblue", bold = true }

select_main = { fg = "black", bg = "lightcyan", bold = true }
select_alt = { fg = "lightcyan", bold = true }

unset_main = { fg = "black", bg = "lightmagenta", bold = true }
unset_alt = { fg = "lightmagenta", bold = true }

[status]
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_sep = { fg = "darkgray" }
perm_type = { fg = "lightblue" }
perm_read = { fg = "yellow" }
perm_write = { fg = "lightred" }
perm_exec = { fg = "lightgreen" }

progress_label = { fg = "white", bold = true }
progress_normal = { fg = "lightgreen", bg = "darkgray" }
progress_error = { fg = "black", bg = "lightred", bold = true }

[pick]
border = { fg = "lightblue" }
active = { fg = "lightmagenta", bold = true }
inactive = { fg = "gray" }

[input]
border = { fg = "lightblue" }
title = { fg = "lightblue", bold = true }
value = { fg = "white" }
selected = { fg = "black", bg = "lightyellow" }

[cmp]
border = { fg = "lightblue" }

[tasks]
border = { fg = "lightblue" }
title = { fg = "lightblue", bold = true }
hovered = { fg = "black", bg = "lightcyan", bold = true }

[which]
mask = { bg = "black" }
cand = { fg = "lightcyan", bold = true }
rest = { fg = "darkgray" }
desc = { fg = "lightmagenta" }
separator = " -> "
separator_style = { fg = "darkgray" }

[help]
on = { fg = "lightcyan", bold = true }
run = { fg = "lightmagenta" }
hovered = { fg = "black", bg = "lightcyan", bold = true }
footer = { fg = "black", bg = "gray" }

[spot]
border = { fg = "lightblue" }
title = { fg = "lightblue", bold = true }
tbl_col = { fg = "lightcyan", bold = true }
tbl_cell = { fg = "white" }

[notify]
title_info = { fg = "lightgreen", bold = true }
title_warn = { fg = "lightyellow", bold = true }
title_error = { fg = "lightred", bold = true }

[filetype]
rules = [
  { url = "*.{7z,ace,alz,arc,arj,bz,bz2,cab,cpio,deb,dwm,dz,ear,esd,gz,jar,lha,lrz,lz,lz4,lzh,lzma,lzo,rar,rpm,rz,sar,swm,t7z,tar,taz,tbz,tbz2,tgz,tlz,txz,tz,tzo,tzst,war,wim,xz,z,zip,zoo,zst}", fg = "red", bold = true },
  { url = "*.{asf,avi,bmp,cgm,dl,emf,flc,fli,flv,gif,gl,heic,jp2,jpeg,jpg,jxl,m2v,m4v,mjpeg,mjpg,mkv,mng,mov,mp4,mp4v,mpeg,mpg,nuv,ogm,ogv,ogx,pbm,pcx,pgm,png,ppm,qt,rm,rmvb,svg,svgz,tga,tif,tiff,vob,webm,wmv,xbm,xcf,xpm,xwd,yuv}", fg = "magenta", bold = true },
  { url = "*.{aac,au,flac,m4a,mid,midi,mka,mp3,mpc,oga,ogg,opus,ra,spx,wav,xspf}", fg = "cyan" },
  { mime = "image/*", fg = "magenta", bold = true },
  { mime = "video/*", fg = "magenta", bold = true },
  { mime = "audio/*", fg = "cyan" },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "red", bold = true },
  { mime = "vfs/{absent,stale}", fg = "darkgray" },
  { url = "*", is = "orphan", fg = "red", bg = "black", bold = true },
  { url = "*", is = "link", fg = "cyan", bold = true },
  { url = "*", is = "block", fg = "yellow", bg = "black", bold = true },
  { url = "*", is = "char", fg = "yellow", bg = "black", bold = true },
  { url = "*", is = "fifo", fg = "yellow", bg = "black" },
  { url = "*", is = "sock", fg = "magenta", bold = true },
  { url = "*", is = "sticky", fg = "white", bg = "blue" },
  { url = "*", is = "exec", fg = "green", bold = true },
  { url = "*", fg = "white" },
  { url = "*/", fg = "blue", bold = true },
]

[icon]
dirs = [
  { name = ".config", text = "", fg = "blue", bold = true },
  { name = ".git", text = "", fg = "blue", bold = true },
  { name = ".github", text = "", fg = "blue", bold = true },
  { name = ".npm", text = "", fg = "blue", bold = true },
  { name = "Desktop", text = "", fg = "blue", bold = true },
  { name = "Development", text = "", fg = "blue", bold = true },
  { name = "Documents", text = "", fg = "blue", bold = true },
  { name = "Downloads", text = "", fg = "blue", bold = true },
  { name = "Library", text = "", fg = "blue", bold = true },
  { name = "Movies", text = "", fg = "blue", bold = true },
  { name = "Music", text = "", fg = "blue", bold = true },
  { name = "Pictures", text = "", fg = "blue", bold = true },
  { name = "Public", text = "", fg = "blue", bold = true },
  { name = "Videos", text = "", fg = "blue", bold = true },
]

conds = [
  { if = "orphan", text = "", fg = "red", bg = "black", bold = true },
  { if = "link", text = "", fg = "cyan", bold = true },
  { if = "block", text = "", fg = "yellow", bg = "black", bold = true },
  { if = "char", text = "", fg = "yellow", bg = "black", bold = true },
  { if = "fifo", text = "", fg = "yellow", bg = "black" },
  { if = "sock", text = "", fg = "magenta", bold = true },
  { if = "sticky", text = "", fg = "white", bg = "blue" },
  { if = "dummy", text = "", fg = "red", bold = true },
  { if = "dir", text = "", fg = "blue", bold = true },
  { if = "exec", text = "", fg = "green", bold = true },
  { if = "!dir", text = "", fg = "white" },
]
