---
- defaults:
    link:
      create: true
      relink: true
      force: true
- clean:
    - '~'
    - ~/.config
    - ~/.local/share
- link:
    ~/:
      glob: true
      path: home/.*
    ~/.config:
      glob: true
      path: xdg-config-home/*
    ~/.local/share:
      glob: true
      path: xdg-data-home/*
    ~/.local/bin:
      glob: true
      path: xdg-bin-home/*
    ~/.zshenv:
      path: ~/.config/zsh/.zshenv
    ~/.ssh:
      glob: true
      path: home_.ssh/*
    ~/Projects:
      glob: true
      path: home_Projects/*
- shell:
    - description: Installing submodules
      command: git submodule update --init --recursive
    - description: Install/Restore neovim plugins
      command: install.d/restore-neovim-plugins.sh
    - description: Install Mason tools
      command: install.d/install-mason-tools.sh
    - description: Install/Update treesitter parsers
      command: install.d/install-treesitter-parsers.sh
    - description: seed files
      command: install.d/seed-files.sh
