specs:
  default:
    output: markdown
    parallel: true
    forks: 4
targets:
  all:
    all: true
tasks:
  status:
    target: all
    cmd: git status --short --branch --untracked-files=all
  fetch:
    target: all
    cmd: git fetch --all
  pull:
    target: all
    cmd: git pull --ff-only
