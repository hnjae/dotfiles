<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
	<alias binding="strong">
		<family>Arial</family>
		<prefer>
			<family>Liberation Sans</family>
			<family>Noto Sans CJK JP</family>
			<family>Noto Sans CJK KR</family>
			<family>Noto Sans CJK SC</family>
			<family>Noto Sans CJK TC</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>Courier New</family>
		<prefer>
			<family>Liberation Mono</family>
			<family>Noto Sans CJK Mono JP</family>
			<family>Noto Sans CJK Mono KR</family>
			<family>Noto Sans CJK Mono SC</family>
			<family>Noto Sans CJK Mono TC</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>Times New Roman</family>
		<prefer>
			<family>Liberation Serif</family>
			<family>HCR Batang LVT</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>Tahoma</family>
	<prefer>
		<family>Noto Sans</family>
			<family>Noto Sans CJK JP</family>
			<family>Noto Sans CJK KR</family>
			<family>Noto Sans CJK SC</family>
			<family>Noto Sans CJK TC</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>Malgun Gothic</family>
		<prefer>
			<family>Noto Sans CJK KR</family>
			<family>Noto Sans CJK JP</family>
			<family>Noto Sans CJK SC</family>
			<family>Noto Sans CJK TC</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>Gulim</family>
		<prefer>
			<family>Noto Sans CJK KR</family>
			<family>Noto Sans CJK JP</family>
			<family>Noto Sans CJK TC</family>
			<family>Noto Sans CJK SC</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>GulimChe</family>
		<prefer>
			<family>Noto Sans CJK Mono KR</family>
			<family>Noto Sans CJK Mono JP</family>
			<family>Noto Sans CJK Mono TC</family>
			<family>Noto Sans CJK Mono SC</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>Dotum</family>
		<prefer>
			<family>Noto Sans CJK KR</family>
			<family>Noto Sans CJK TC</family>
			<family>Noto Sans CJK JP</family>
			<family>Noto Sans CJK SC</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>DotumChe</family>
		<prefer>
			<family>Noto Sans CJK Mono KR</family>
			<family>Noto Sans CJK Mono TC</family>
			<family>Noto Sans CJK Mono JP</family>
			<family>Noto Sans CJK Mono SC</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>Batang</family>
		<prefer>
			<family>Noto Sans CJK KR</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>BatangChe</family>
		<prefer>
			<family>Noto Sans CJK Mono KR</family>
			<family>Noto Sans CJK Mono TC</family>
			<family>Noto Sans CJK Mono JP</family>
			<family>Noto Sans CJK Mono SC</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>NanumGothic</family>
		<prefer>
			<family>KoPubDotum Medium</family>
			<family>Noto Sans CJK KR</family>
			<family>IPAexGothic</family>
			<family>Noto Sans CJK SC</family>
			<family>Noto Sans CJK TC</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>NanumBarunGothic</family>
		<prefer>
			<family>KoPubDotum Medium</family>
			<family>Noto Sans CJK KR</family>
			<family>IPAexGothic</family>
			<family>Noto Sans CJK SC</family>
			<family>Noto Sans CJK TC</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>NanumMyeongjo</family>
		<prefer>
			<family>Iropke Batang OTF</family>
			<family>HCR Batang LVT</family>
			<family>Noto Serif CJK KR</family>
			<family>IPAexGothic</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>Meiryo</family>
		<prefer>
			<family>Noto Sans CJK JP</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>MS Gothic</family>
		<prefer>
			<family>IPAGothic</family>
			<family>IPAexGothic</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>MS PGothic</family>
		<prefer>
			<family>IPAPGothic</family>
			<family>IPAexGothic</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>MS Mincho</family>
		<prefer>
			<family>IPAMincho</family>
			<family>IPAexMincho</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>MS PMincho</family>
		<prefer>
			<family>IPAPMincho</family>
			<family>IPAexMincho</family>
		</prefer>
	</alias>
</fontconfig>
