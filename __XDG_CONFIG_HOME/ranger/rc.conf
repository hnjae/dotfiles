# console trash 로 하면 한번더 묻게 된다.
# map <F8> console delete
map dt trash
map dT TrashWithTrace
map pP paste
# default: paste append=True
map pp paste append=True

map pM paste merge=True
# default: paste
unmap po
# default: paste overwrite=True

# Extend g command (go-to) / G: Go-to End
map gc<space> cd ~/.config
map gcd cd ~/.config/dunst
map gcr cd ~/.config/ranger
map gcm cd ~/.config/mako
map gci cd ~/.config/i3
map gcni cd ~/.config/nvim/vim-include/
map gcnl cd ~/.config/nvim/lua/
map gcn<space> cd ~/.config/nvim/
map gcs cd ~/.config/sway
map gcw cd ~/.config/waybar
map gcp cd ~/.config/polybar
map gll cd ~/.local/lib
map glb cd ~/.local/bin/
map gls<space> cd ~/.local/share/
map glsa cd ~/.local/share/applications
# map gv cd ~/Drive
# map gn cd ~/Nextcloud
map gs<space> cd ~/Sync
map gsc cd ~/Sync/Config Files
map gsl cd ~/Sync/Library
map gm cd /media/pool
map gi cd /run/user/1000/gvfs

map gu<space> cd /usr
map gul<space> cd /usr/local
map gulb cd /usr/local/bin
map guls cd /usr/local/share
map gus<space> cd /usr/share
map gusa cd /usr/share/applications

# b/B: not in use maybe
# ,/<: not-in-yse
